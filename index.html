function confirmAddDoc() {
  const title = document.getElementById('docTitle').value.trim();
  const fileInput = document.getElementById('docFile');
  
  if (!title) { alert('자료 제목을 입력하세요'); return; }
  if (!fileInput.files[0]) { alert('파일을 선택하세요'); return; }
  
  const file = fileInput.files[0];
  if (file.size > 8 * 1024 * 1024) {
    if (!confirm(`파일 크기가 ${formatFileSize(file.size)}로 큽니다. localStorage 한계를 초과할 수 있습니다.\n\n그래도 진행하시겠습니까?`)) {
      return;
    }
  }
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const docs = getMouDocs();
      const doc = {
        id: 'doc_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
        title,
        fileName: file.name,
        mimeType: file.type,
        size: file.size,
        dataUrl: e.target.result,
        addedAt: new Date().toISOString().slice(0, 10),
      };
      docs.push(doc);
      setMouDocs(docs);
      closeModal();
      toast(`📎 "${title}" 첨부 완료`);
      rerenderCurrent();
    } catch (err) {
      alert('파일 저장 실패: ' + err.message + '\n\n파일이 너무 클 수 있습니다.');
    }
  };
  reader.onerror = () => alert('파일 읽기 실패');
  reader.readAsDataURL(file);
}

function downloadDoc(id) {
  const docs = getMouDocs();
  const d = docs.find(x => x.id === id);
  if (!d) return;
  const a = document.createElement('a');
  a.href = d.dataUrl;
  a.download = d.fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast(`📥 ${d.title} 다운로드`);
}

function renameDoc(id) {
  const docs = getMouDocs();
  const d = docs.find(x => x.id === id);
  if (!d) return;
  const newTitle = prompt('새 제목을 입력하세요:', d.title);
  if (!newTitle || !newTitle.trim()) return;
  d.title = newTitle.trim();
  setMouDocs(docs);
  toast('✏️ 제목 변경됨');
  rerenderCurrent();
}

function deleteDoc(id) {
  const docs = getMouDocs();
  const d = docs.find(x => x.id === id);
  if (!d) return;
  if (!confirm(`"${d.title}" 자료를 삭제하시겠습니까?`)) return;
  setMouDocs(docs.filter(x => x.id !== id));
  toast('🗑️ 자료 삭제됨');
  rerenderCurrent();
}

function copyMail(id, type) {
  const tpl = MAIL_TEMPLATES.find(t => t.id === id);
  if (!tpl) return;
  let text = '';
  if (type === 'subject') text = tpl.subject;
  else text = tpl.body || DATA[tpl.bodyKey] || '';
  
  // navigator.clipboard 우선, 폴백으로 textarea + execCommand
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      toast(`${type === 'subject' ? '제목' : '본문'} 복사 완료`);
    } catch {
      toast('복사 실패 — 직접 선택하여 복사해주세요');
    }
    document.body.removeChild(ta);
  };
  
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      toast(`${type === 'subject' ? '제목' : '본문'} 복사 완료`);
    }).catch(fallback);
  } else {
    fallback();
  }
}

// 데이터 버전 - stage 시스템 변경/필드 추가 시 변경사항 자동 정리
const DATA_VERSION = 'v16-question-tab-2026-04-30';

function checkDataVersion() {
  const prev = lsGet('dataVersion', null);
  if (prev !== DATA_VERSION) {
    // stage 의미가 바뀌었으므로 mouOverrides의 옛 stage 정보 무시 (recalcStage가 자동 재계산)
    if (prev !== null) {
      localStorage.removeItem(LS_KEY_PREFIX + 'gradeOverrides');
      localStorage.removeItem(LS_KEY_PREFIX + 'gradeAdds');
      console.log('데이터 버전 변경 감지 → 등급 변경사항 자동 초기화 (MOU stage는 recalcStage로 자동 변환)');
    }
    lsSet('dataVersion', DATA_VERSION);
  }
}

function init() {
  // 데이터 버전 체크 (새 데이터 교체 감지)
  checkDataVersion();

  // 사이드바 배지
  document.getElementById('badge-pending').textContent = DATA.meta.newMouPending;
  document.getElementById('badge-done').textContent = DATA.meta.newMouDone;
  document.getElementById('badge-hurdle').textContent = DATA.meta.newMouHurdle;
  document.getElementById('badge-grades').textContent = DATA.meta.totalGradeCompanies;

  // 헤더 통계
  document.getElementById('headerStat').textContent = DATA.meta.totalGradeCompanies;
  document.getElementById('headerStatMou').textContent = DATA.meta.newMouActive;

  // 마지막 업데이트 (today)
  document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('ko-KR');

  // y26 컬럼 보장 (모든 등급 데이터에)
  ['S','A','B','C','N','F'].forEach(g => {
    if (DATA.grades[g]) {
      DATA.grades[g].forEach(c => {
        if (c.y26 === undefined) c.y26 = '';
      });
    }
  });

  // 잘못된 newMou 항목 제거 (등급 표기, 헤더 행 등 데이터 오류)
  cleanupInvalidMouEntries();

  // localStorage overrides + adds 적용
  applyAdds();      // 추가된 항목 (등급/MOU)
  applyOverrides(); // 단계 이동 변경사항

  // 파일 input 이벤트 등록
  setupFileInputs();

  // 마지막 뷰 복원
  const lastView = lsGet('lastView', 'dashboard');
  setView(lastView);
}

// 추가된 등급/MOU 항목 적용 (localStorage adds → DATA)
function applyAdds() {
  // 등급 추가
  const gradeAdds = lsGet('gradeAdds', []);
  gradeAdds.forEach(item => {
    const targetGrade = item.grade || (item.y25 || 'N')[0] || 'N';
    if (!DATA.grades[targetGrade]) DATA.grades[targetGrade] = [];
    // 중복 방지
    const exists = ['S','A','B','C','N','F'].some(g => 
      DATA.grades[g] && DATA.grades[g].find(c => c.name === item.name)
    );
    if (!exists) {
      const { grade, ...rest } = item;
      if (rest.y26 === undefined) rest.y26 = '';
      DATA.grades[targetGrade].push({ ...rest, _added: true, _fromMou: !!item._fromMou });
    }
  });
  
  // 등급 수정사항 적용
  const gradeOverrides = lsGet('gradeOverrides', {});
  Object.entries(gradeOverrides).forEach(([name, changes]) => {
    // 기존 등급에서 찾아서 업데이트
    let found = false;
    ['S','A','B','C','N','F'].forEach(g => {
      if (DATA.grades[g]) {
        const idx = DATA.grades[g].findIndex(c => c.name === name);
        if (idx >= 0) {
          // 25년 등급이 바뀌었으면 그룹 이동
          const newGrade = (changes.y25 || g)[0];
          if (newGrade !== g) {
            const item = { ...DATA.grades[g][idx], ...changes, _modified: true };
            DATA.grades[g].splice(idx, 1);
            if (!DATA.grades[newGrade]) DATA.grades[newGrade] = [];
            DATA.grades[newGrade].push(item);
          } else {
            DATA.grades[g][idx] = { ...DATA.grades[g][idx], ...changes, _modified: true };
          }
          found = true;
        }
      }
    });
  });
  
  // 신규 MOU 추가
  const newMouAdds = lsGet('newMouAdds', []);
  newMouAdds.forEach(item => {
    if (!DATA.newMou.find(c => c.company === item.company)) {
      DATA.newMou.push({ ...item, _added: true });
    }
  });
  
  // meta 재계산
  if (typeof recalcGradeMeta === 'function') recalcGradeMeta();
  
  // 사이드바 카운트 업데이트
  updateSidebarBadges();
}

function updateSidebarBadges() {
  const setBadge = (id, val) => {
    const el = document.getElementById(id);
    if (el) el.textContent = val || '';
  };
  setBadge('badge-grades', DATA.meta.totalGradeCompanies);
  setBadge('badge-hurdle', DATA.newMou.filter(c => c.hurdle).length);
  if (DATA.partnerList && DATA.partnerList.internal) {
    const cnt = DATA.partnerList.internal.length + lsGet('partnerList_internal_adds', []).length - lsGet('partnerList_internal_deletes', []).length;
    setBadge('badge-partnerlist', cnt);
  }
}

// ============ Firebase 실시간 동기화 ============
const firebaseConfig = {
  apiKey: "AIzaSyC8zBE4_O-GLIua5fCAQ065r60qhiqZ6KI",
  authDomain: "pour-partner-dashboard.firebaseapp.com",
  databaseURL: "https://pour-partner-dashboard-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pour-partner-dashboard",
  storageBucket: "pour-partner-dashboard.firebasestorage.app",
  messagingSenderId: "245884548315",
  appId: "1:245884548315:web:d4fe841d5529732c5288fe"
};

let FB_DB = null;
let FB_BASE = null;
let FB_INITIALIZED = false;
let FB_CONNECTED = false;
const FB_WRITE_GUARD = {};

try {
  firebase.initializeApp(firebaseConfig);
  FB_DB = firebase.database();
  FB_BASE = FB_DB.ref('partner');
} catch (e) {
  console.error('Firebase 초기화 실패:', e);
}

// Firebase 경로 안전화 (. # $ [ ] / 금지)
function fbSafeKey(k) {
  return k.replace(/[.#$\[\]\/]/g, '_');
}

// 동기화 대상 키 판별
function fbShouldSync(k) {
  // 사용자 개인 UI 상태 → 동기화 안 함
  const SKIP_EXACT = ['lastView', 'gradeCriteriaCollapsed', 'dataVersion', 'checklistCompany', 'mouDocs'];
  if (SKIP_EXACT.includes(k)) return false;
  if (k.startsWith('curriculumExpanded_')) return false;

  // 공유 데이터 → 동기화
  const SYNC_EXACT = ['mouOverrides', 'newMouAdds', 'gradeOverrides', 'gradeAdds', 'hurdleActions'];
  if (SYNC_EXACT.includes(k)) return true;
  if (k.startsWith('partnerList_')) return true;
  if (k.startsWith('companyDocs_')) return true;
  if (k.startsWith('checklistChecks_')) return true;

  return false;
}

// 에코 방지용 가드 (300ms)
function fbGuard(safeK) {
  if (FB_WRITE_GUARD[safeK]) clearTimeout(FB_WRITE_GUARD[safeK]);
  FB_WRITE_GUARD[safeK] = setTimeout(() => { delete FB_WRITE_GUARD[safeK]; }, 300);
}
function fbIsGuarded(safeK) { return !!FB_WRITE_GUARD[safeK]; }

// 연결 상태 배지
function updateConnBadge(connected) {
  FB_CONNECTED = connected;
  const badge = document.getElementById('connBadge');
  if (!badge) return;
  badge.innerHTML = connected
    ? '<span style="color:#16a34a">🟢 실시간 동기화</span>'
    : '<span style="color:#dc2626">🔴 오프라인</span>';
}

// lsSet 가로채기: 로컬 저장 + Firebase 쓰기
const _lsSetOriginal = lsSet;
window.lsSet = function(k, v) {
  _lsSetOriginal(k, v);
  if (!FB_BASE) return;
  if (!fbShouldSync(k)) return;
  const safeK = fbSafeKey(k);
  if (fbIsGuarded(safeK)) return;
  fbGuard(safeK);
  FB_BASE.child(safeK).set(v).catch(err => {
    console.warn('FB write 실패:', k, err);
  });
};

// 원격 변경 적용
function fbApplyRemote(safeK, val) {
  if (fbIsGuarded(safeK)) return;
  fbGuard(safeK);
  _lsSetOriginal(safeK, val);
  // 모달이 열려있지 않을 때만 자동 재렌더 (편집 중 방해 방지)
  const modalOpen = document.getElementById('modal')?.classList.contains('show');
  if (!modalOpen) {
    try {
      if (typeof applyAdds === 'function') applyAdds();
      if (typeof applyOverrides === 'function') applyOverrides();
      if (typeof cleanupInvalidMouEntries === 'function') cleanupInvalidMouEntries();
      const lastView = lsGet('lastView', 'dashboard');
      if (typeof setView === 'function') setView(lastView);
    } catch (e) { console.warn('재렌더 오류', e); }
  }
}

// 초기 데이터 동기화: 원격 우선, 없으면 로컬→원격 마이그레이션
function fbInit() {
  if (!FB_BASE) {
    updateConnBadge(false);
    return;
  }

  // 연결 상태 모니터링
  FB_DB.ref('.info/connected').on('value', snap => {
    updateConnBadge(snap.val() === true);
  });

  FB_BASE.once('value').then(snap => {
    const remote = snap.val() || {};
    let migrated = 0;
    let loaded = 0;

    // 1) 로컬의 동기화 대상 키 수집
    const localKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const fullKey = localStorage.key(i);
      if (!fullKey || !fullKey.startsWith(LS_KEY_PREFIX)) continue;
      const k = fullKey.substring(LS_KEY_PREFIX.length);
      if (fbShouldSync(k)) localKeys.push(k);
    }

    // 2) 로컬 키 처리: 원격에 있으면 원격값 사용, 없으면 마이그레이션
    const processedSafeKeys = new Set();
    localKeys.forEach(k => {
      const safeK = fbSafeKey(k);
      processedSafeKeys.add(safeK);
      const remoteVal = remote[safeK];
      const localVal = lsGet(k, null);

      if (remoteVal != null) {
        _lsSetOriginal(k, remoteVal);
        loaded++;
      } else if (localVal != null) {
        fbGuard(safeK);
        FB_BASE.child(safeK).set(localVal);
        migrated++;
      }
    });

    // 3) 원격에만 있는 키 (다른 사용자가 만든 데이터) 가져오기
    Object.keys(remote).forEach(safeK => {
      if (processedSafeKeys.has(safeK)) return;
      _lsSetOriginal(safeK, remote[safeK]);
      loaded++;
    });

    if (migrated > 0) {
      console.log(`☁️ ${migrated}개 항목 클라우드 업로드 완료`);
      setTimeout(() => toast(`☁️ 기존 데이터 ${migrated}개 클라우드 업로드`), 500);
    }
    if (loaded > 0) {
      console.log(`☁️ ${loaded}개 항목 클라우드에서 로드`);
    }

    FB_INITIALIZED = true;

    // 초기 데이터 반영 후 화면 다시 그리기
    try {
      if (typeof applyAdds === 'function') applyAdds();
      if (typeof applyOverrides === 'function') applyOverrides();
      if (typeof cleanupInvalidMouEntries === 'function') cleanupInvalidMouEntries();
      const lastView = lsGet('lastView', 'dashboard');
      if (typeof setView === 'function') setView(lastView);
    } catch (e) { console.warn('초기 렌더 오류', e); }

    // 4) 실시간 리스너 등록
    FB_BASE.on('child_added', s => {
      if (!FB_INITIALIZED) return;
      fbApplyRemote(s.key, s.val());
    });
    FB_BASE.on('child_changed', s => {
      fbApplyRemote(s.key, s.val());
    });

  }).catch(err => {
    console.error('Firebase 초기 로드 실패:', err);
    updateConnBadge(false);
    setTimeout(() => toast('⚠️ 클라우드 연결 실패 - 로컬 모드로 동작'), 1000);
  });
}

// init() 이후 Firebase 시작
window.addEventListener('load', () => {
  setTimeout(fbInit, 300);
});

init();

// ESC 키로 모달 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('globalSearch').focus();
  }
});
