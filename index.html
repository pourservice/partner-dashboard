<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POUR공법 | 협력업체 통합 관리 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<!-- Firebase SDK (compat 모드) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root {
  /* === 메인 4컬러 팔레트 (이미지 기반) === */
  --primary: #14213D;        /* 짙은 네이비 - 기본 컬러 */
  --primary-md: #1F2F50;     /* 중간 네이비 */
  --primary-lt: #D9DEE7;     /* 연한 네이비 톤 */
  --primary-bg: #EEF1F5;     /* 네이비 매우 연한 톤 */
  --accent: #E89817;         /* 머스타드 오렌지 - 강조색 */
  --accent-md: #F2A930;      /* 밝은 오렌지 */
  --accent-lt: #FCEFD8;      /* 매우 연한 오렌지 톤 */
  --accent-deep: #B87410;    /* 깊은 오렌지 */
  --bg: #F5F4F2;             /* 따뜻한 오프화이트 */
  --bg-card: #FFFFFF;        /* 카드 배경 */
  --bg-soft: #FAFAF8;        /* 매우 연한 배경 */
  --border: #E5E3DF;         /* 테두리 */
  --border-strong: #C8C5BF;  /* 강조 테두리 */
  --text: #14213D;           /* 메인 텍스트 (네이비) */
  --text-md: #5C5A66;        /* 차콜 그레이 */
  --text-lt: #8B8990;        /* 연한 차콜 */
  --text-xlt: #B5B3B8;       /* 매우 연한 그레이 */
  --success: #1B6E2F;
  --success-lt: #E2F2E5;
  --warn: #B87410;           /* 경고 = 깊은 오렌지 */
  --warn-lt: #FCEFD8;
  --danger: #A8341A;         /* 짙은 적갈색 */
  --danger-lt: #F7E4DD;
  --info: #14213D;
  --info-lt: #D9DEE7;

  --grade-s: #14213D;        /* 네이비 */
  --grade-a: #2D4670;        /* 미디엄 네이비 */
  --grade-b: #E89817;        /* 오렌지 */
  --grade-c: #8B8990;        /* 차콜 */
  --grade-n: #4A6B96;        /* 연 네이비 */
  --grade-f: #A8341A;        /* 짙은 적갈색 */
  --grade-d: #6E6B73;

  --stage-0: #E5E1D9;  /* 질문서 (워름 베이지) */
  --stage-1: #D5DEE9;  /* 1차미팅 대기 (라이트 네이비) */
  --stage-2: #A4B5CC;  /* 1차미팅 완료 (미디엄 네이비) */
  --stage-3: #FCE4B8;  /* 2차미팅 대기 (라이트 오렌지) */
  --stage-4: #F2C887;  /* 2차미팅 완료 (오렌지) */
  --stage-5: #B5C9A8;  /* MOU 체결 (세이지 그린) */
  --stage-0-text: #6B5944;
  --stage-1-text: #14213D;
  --stage-2-text: #FFFFFF;
  --stage-3-text: #8A5A00;
  --stage-4-text: #6B4410;
  --stage-5-text: #2A4A1B;

  --shadow-sm: 0 1px 2px rgba(20,33,61,0.06);
  --shadow-md: 0 2px 8px rgba(20,33,61,0.08);
  --shadow-lg: 0 4px 16px rgba(20,33,61,0.10);
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
  --sidebar-w: 220px;
  --header-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

button {
  font-family: inherit; font-size: inherit;
  border: none; background: none; cursor: pointer; color: inherit;
}

input, select, textarea {
  font-family: inherit; font-size: inherit; color: inherit;
}

.tabular { font-variant-numeric: tabular-nums; }
.mono { font-family: 'JetBrains Mono', 'Menlo', monospace; }

/* ================ Layout ================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-areas:
    "sidebar header"
    "sidebar main";
  min-height: 100vh;
}

.sidebar {
  grid-area: sidebar;
  background: linear-gradient(180deg, #14213D 0%, #0F1A30 100%);
  color: #fff;
  display: flex;
  flex-direction: column;
  position: sticky; top: 0;
  height: 100vh;
  overflow-y: auto;
  box-shadow: 4px 0 20px rgba(0,0,0,0.15);
}
/* 사이드바 스크롤바 스타일 */
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
.sidebar::-webkit-scrollbar-thumb:hover { background: rgba(232,152,23,0.5); }

.brand {
  padding: 16px 18px 14px;
  background: linear-gradient(135deg, rgba(232,152,23,0.12) 0%, transparent 60%);
  border-bottom: 1px solid rgba(232,152,23,0.15);
  display: flex; flex-direction: column; gap: 4px;
  position: relative;
}
.brand::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--accent) 0%, transparent 80%);
}
.brand-row {
  display: flex; align-items: center; gap: 9px;
}
.brand-mark {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: #fff;
  letter-spacing: -0.02em;
  box-shadow: 0 3px 10px rgba(232,152,23,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
}
.brand-name {
  font-weight: 800; font-size: 14.5px; letter-spacing: -0.3px;
  background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.85) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-sub {
  font-size: 10px; color: rgba(255,255,255,0.55);
  font-weight: 500; letter-spacing: 0.04em;
  padding-left: 37px;
  margin-top: -2px;
}

.nav-group {
  padding: 12px 0 4px;
  position: relative;
}
.nav-group + .nav-group {
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 2px;
}
.nav-label {
  padding: 0 18px 6px;
  font-size: 8.5px; font-weight: 800;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent);
  display: flex; align-items: center; gap: 5px;
}
.nav-label::before {
  content: '';
  width: 3px; height: 3px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 5px rgba(232,152,23,0.6);
}

.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 18px;
  color: rgba(255,255,255,0.78);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.nav-item:hover {
  background: linear-gradient(90deg, rgba(232,152,23,0.08) 0%, transparent 100%);
  color: #fff;
  border-left-color: rgba(232,152,23,0.4);
  padding-left: 21px;
}
.nav-item:hover .nav-icon {
  background: rgba(232,152,23,0.18);
  color: var(--accent);
  transform: scale(1.05);
}
.nav-item.active {
  background: linear-gradient(90deg, rgba(232,152,23,0.18) 0%, rgba(232,152,23,0.04) 100%);
  color: #fff;
  border-left-color: var(--accent);
  font-weight: 700;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}
.nav-item.active::after {
  content: '';
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--accent);
  animation: navPulse 2s ease-in-out infinite;
}
@keyframes navPulse {
  0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
  50% { opacity: 0.5; transform: translateY(-50%) scale(1.4); }
}
.nav-item.active .nav-icon {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 6px rgba(232,152,23,0.4);
}

.nav-icon {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
  background: rgba(255,255,255,0.05);
  border-radius: 5px;
  transition: all 0.15s;
}
.nav-text { flex: 1; letter-spacing: -0.1px; }
.nav-badge {
  font-size: 9.5px;
  padding: 1px 7px;
  border-radius: 9px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.75);
  font-weight: 700;
  letter-spacing: 0;
  border: 1px solid rgba(255,255,255,0.08);
  min-width: 20px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.nav-item:hover .nav-badge {
  background: rgba(232,152,23,0.15);
  border-color: rgba(232,152,23,0.3);
  color: var(--accent);
}
.nav-item.active .nav-badge {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent-deep);
  box-shadow: 0 2px 6px rgba(232,152,23,0.4);
}

/* 그룹별 강조색 - OVERVIEW (대시보드) */
.nav-group:nth-of-type(1) .nav-label::before {
  background: #95C99A;  /* 세이지 그린 */
  box-shadow: 0 0 6px rgba(149,201,154,0.6);
}
.nav-group:nth-of-type(1) .nav-label { color: #95C99A; }

/* 그룹별 강조색 - 신규 MOU */
.nav-group:nth-of-type(2) .nav-label::before {
  background: var(--accent);
  box-shadow: 0 0 6px rgba(232,152,23,0.6);
}
.nav-group:nth-of-type(2) .nav-label { color: var(--accent); }

/* 그룹별 강조색 - 기존 협력업체 */
.nav-group:nth-of-type(3) .nav-label::before {
  background: #A4B5CC;  /* 라이트 네이비 */
  box-shadow: 0 0 6px rgba(164,181,204,0.6);
}
.nav-group:nth-of-type(3) .nav-label { color: #A4B5CC; }

/* 그룹별 강조색 - 자료 관리 */
.nav-group:nth-of-type(4) .nav-label::before {
  background: #C8B591;  /* 베이지 골드 */
  box-shadow: 0 0 6px rgba(200,181,145,0.6);
}
.nav-group:nth-of-type(4) .nav-label { color: #C8B591; }

.sidebar-footer {
  margin-top: auto;
  padding: 12px 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 9.5px; color: rgba(255,255,255,0.45);
  display: flex; flex-direction: column; gap: 3px;
  background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.2) 100%);
}
.sidebar-footer > div:first-child {
  font-weight: 700;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.05em;
}

/* ================ Header ================ */
.header {
  grid-area: header;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky; top: 0; z-index: 10;
}
.header-title {
  font-size: 14px; font-weight: 600;
  color: var(--text);
}
.header-spacer { flex: 1; }
.search-box {
  display: flex; align-items: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 6px 12px;
  width: 280px;
  gap: 8px;
}
.search-box:focus-within {
  border-color: var(--primary-md);
  background: #fff;
}
.search-box svg { flex-shrink: 0; opacity: 0.5; }
.search-box input {
  border: none; outline: none; background: none;
  flex: 1;
  font-size: 12px;
}
.search-box input::placeholder {
  color: var(--text-xlt);
}
.header-meta {
  font-size: 11px; color: var(--text-lt);
  display: flex; align-items: center; gap: 4px;
}
.header-meta strong { color: var(--text-md); font-weight: 600; }

/* ================ Main ================ */
.main {
  grid-area: main;
  padding: 24px 28px 40px;
  background: var(--bg);
  overflow-x: auto;
}

.view { display: none; animation: fadeIn 0.2s ease; }
.view.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(2px); }
  to { opacity: 1; transform: translateY(0); }
}

.view-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap; gap: 12px;
}
.view-title {
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--text);
  display: flex; align-items: center; gap: 10px;
}
.view-title .accent-bar {
  width: 4px; height: 22px;
  background: var(--accent);
  border-radius: 2px;
}
.view-sub {
  font-size: 12px; color: var(--text-lt);
  margin-top: 4px;
}

/* ================ KPI Cards ================ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--primary);
}
.kpi-card.accent::before { background: var(--accent); }
.kpi-card.success::before { background: var(--success); }
.kpi-card.warn::before { background: var(--warn); }
.kpi-card.danger::before { background: var(--danger); }
.kpi-card.info::before { background: var(--info); }

.kpi-label {
  font-size: 11px; font-weight: 600;
  color: var(--text-lt);
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}
.kpi-value {
  font-size: 28px; font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.kpi-unit {
  font-size: 13px; font-weight: 600;
  color: var(--text-md);
  margin-left: 2px;
}
.kpi-sub {
  font-size: 10.5px; color: var(--text-lt);
  margin-top: 6px;
  font-weight: 500;
}
.kpi-sub strong { color: var(--text-md); font-weight: 600; }

/* ================ Section ================ */
.section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap; gap: 8px;
}
.section-title {
  font-size: 14px; font-weight: 700;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
  letter-spacing: -0.02em;
}
.section-title-bar {
  width: 3px; height: 14px;
  background: var(--primary);
  border-radius: 1px;
}
.section-sub {
  font-size: 11px; color: var(--text-lt);
  font-weight: 500;
}

/* ================ Table ================ */
.table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12px;
}
.table th, .table td {
  padding: 9px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.table th {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--text-md);
  letter-spacing: 0.02em;
  background: var(--primary-bg);
  border-bottom: 1px solid var(--border-strong);
  position: sticky; top: 0; z-index: 1;
}
.table tr:hover td { background: rgba(30,74,68,0.025); }
.table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.table td.center { text-align: center; }
.table td.company { font-weight: 600; color: var(--primary); }
.table .row-no {
  color: var(--text-xlt); font-size: 11px; width: 36px;
}

/* ================ Badge ================ */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px;
  font-size: 10.5px; font-weight: 700;
  border-radius: 4px;
  letter-spacing: 0.02em;
  line-height: 1.4;
  white-space: nowrap;
}
.badge.grade-s { background: var(--grade-s); color: #fff; }
.badge.grade-a { background: var(--grade-a); color: #fff; }
.badge.grade-b { background: var(--grade-b); color: #fff; }
.badge.grade-c { background: var(--grade-c); color: #fff; }
.badge.grade-n { background: var(--grade-n); color: #fff; }
.badge.grade-f { background: var(--grade-f); color: #fff; }
.badge.grade-d { background: var(--grade-d); color: #fff; }
.badge.muted { background: var(--bg); color: var(--text-xlt); }
.badge.lg { padding: 4px 10px; font-size: 11px; }

.stage-pill {
  display: inline-flex; align-items: center;
  padding: 2px 8px;
  font-size: 10.5px; font-weight: 700;
  border-radius: 10px;
  white-space: nowrap;
  gap: 4px;
}
.stage-pill.s0 { background: var(--stage-0); color: var(--stage-0-text); }
.stage-pill.s1 { background: var(--stage-1); color: var(--stage-1-text); }
.stage-pill.s2 { background: var(--stage-2); color: var(--stage-2-text); }
.stage-pill.s3 { background: var(--stage-3); color: var(--stage-3-text); }
.stage-pill.s4 { background: var(--stage-4); color: var(--stage-4-text); }
.stage-pill.s5 { background: var(--stage-5); color: var(--stage-5-text); }
.stage-pill.s0 { background: var(--bg); color: var(--text-xlt); }

.dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 6px;
  vertical-align: 0;
}

/* ================ Buttons ================ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: var(--radius-md);
  font-size: 11.5px; font-weight: 600;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-md);
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover {
  border-color: var(--primary-md); color: var(--primary);
}
.btn.primary {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.btn.primary:hover { background: var(--primary-md); border-color: var(--primary-md); color: #fff; }
.btn.accent {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.btn.accent:hover { background: var(--accent-md); border-color: var(--accent-md); color: #fff; }
.btn.sm { padding: 4px 8px; font-size: 11px; }
.btn.icon { padding: 6px 8px; }

/* ================ Filter Bar ================ */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.filter-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-md);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-pill:hover { border-color: var(--primary-md); }
.filter-pill.active {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.filter-pill .count {
  font-size: 10px;
  font-weight: 700;
  background: rgba(0,0,0,0.06);
  padding: 0 6px;
  border-radius: 8px;
}
.filter-pill.active .count {
  background: rgba(255,255,255,0.2);
}

select.input, input.input {
  padding: 6px 12px;
  border-radius: var(--radius-md);
  font-size: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  outline: none;
  cursor: pointer;
}
select.input:focus, input.input:focus {
  border-color: var(--primary-md);
}

/* ================ Process / Stage Visualization ================ */
.process-flow {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-bottom: 20px;
  position: relative;
}
.process-step {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 12px 12px;
  text-align: center;
  position: relative;
  cursor: pointer;
  transition: all 0.15s;
}
.process-step:hover {
  border-color: var(--primary-md);
  box-shadow: var(--shadow-sm);
}
.process-step.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-lt);
}
.process-step::after {
  content: '▶';
  position: absolute;
  right: -10px; top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--text-xlt);
  z-index: 2;
}
.process-step:last-child::after { display: none; }
.process-step-num {
  font-size: 9px; font-weight: 700;
  color: var(--text-lt);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.process-step-label {
  font-size: 11.5px; font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.process-step-count {
  font-size: 22px; font-weight: 800;
  color: var(--primary);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  line-height: 1;
}
.process-step-count .unit {
  font-size: 11px; font-weight: 600;
  color: var(--text-md); margin-left: 1px;
}
.process-step-bar {
  height: 3px; border-radius: 2px;
  background: var(--bg);
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}
.process-step-bar-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 2px;
}
.process-step.s0 .process-step-bar-fill { background: var(--stage-0); }
.process-step.s1 .process-step-bar-fill { background: var(--stage-1); }
.process-step.s2 .process-step-bar-fill { background: var(--stage-2); }
.process-step.s3 .process-step-bar-fill { background: var(--stage-3); }
.process-step.s4 .process-step-bar-fill { background: var(--stage-4); }
.process-step.s5 .process-step-bar-fill { background: var(--stage-5); }

/* ================ Kanban ================ */
.kanban {
  display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.kanban.kanban-5col {
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}
@media (max-width: 1400px) {
  .kanban.kanban-5col {
    grid-template-columns: repeat(5, minmax(200px, 1fr));
    overflow-x: auto;
  }
}
.kanban-col {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px;
  min-height: 200px;
}
.kanban-col-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 4px;
}
.kanban-col-title {
  font-size: 11.5px; font-weight: 700;
  color: var(--text);
  display: flex; align-items: center; gap: 6px;
}
.kanban-col-title .stage-mark {
  width: 10px; height: 10px; border-radius: 2px;
}
.kanban-col-count {
  font-size: 10px; font-weight: 700;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 1px 8px; border-radius: 10px;
  color: var(--text-md);
}
.kanban-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid var(--primary-md);
}
.kanban-card:hover {
  border-color: var(--primary-md);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}
.kanban-card.s1 { border-left-color: var(--stage-1-text); }
.kanban-card.s2 { border-left-color: var(--stage-2-text); }
.kanban-card.s3 { border-left-color: var(--stage-3-text); }
.kanban-card.s4 { border-left-color: var(--stage-4-text); }
.kanban-card.s5 { border-left-color: var(--stage-5-text); }
.kanban-card.warning { border-left-color: var(--warn); }
.kanban-card.danger { border-left-color: var(--danger); }

.kanban-card-name {
  font-size: 12.5px; font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.kanban-card-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px;
  color: var(--text-lt);
  margin-top: 4px;
  flex-wrap: wrap;
}
.kanban-card-meta strong { color: var(--text-md); font-weight: 600; }
.kanban-card-days {
  font-size: 10px; font-weight: 700;
  color: var(--text-md);
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg);
}
.kanban-card-days.warn { color: var(--warn); background: var(--warn-lt); }
.kanban-card-days.danger { color: var(--danger); background: var(--danger-lt); }

/* ================ Modal ================ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
  padding: 20px;
  animation: fadeIn 0.15s ease;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  max-width: 720px; width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(6px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg-card);
}
.modal-title {
  font-size: 16px; font-weight: 700;
  color: var(--text); letter-spacing: -0.02em;
}
.modal-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text-lt);
  cursor: pointer;
}
.modal-close:hover { background: var(--bg); color: var(--text); }
.modal-body { padding: 20px 24px; }

/* ================ Progress Bar ================ */
.progress-bar {
  display: flex; gap: 2px;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  background: var(--bg);
  margin: 8px 0;
}
.progress-bar-step {
  flex: 1;
  background: var(--bg);
  position: relative;
}
.progress-bar-step.done.s1 { background: var(--stage-1); }
.progress-bar-step.done.s2 { background: var(--stage-2); }
.progress-bar-step.done.s3 { background: var(--stage-3); }
.progress-bar-step.done.s4 { background: var(--stage-4); }
.progress-bar-step.done.s5 { background: var(--stage-5); }

/* ================ Mail Templates ================ */
.mail-template {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  overflow: hidden;
}
.mail-header {
  background: var(--primary);
  color: #fff;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  transition: background 0.15s;
}
.mail-header:hover { background: var(--primary-md); }
.mail-title {
  font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em;
}
.mail-when {
  font-size: 10.5px; opacity: 0.7; margin-top: 2px;
}
.mail-body-wrap {
  padding: 18px 20px;
  display: none;
}
.mail-body-wrap.show { display: block; }
.mail-meta {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 6px 16px;
  margin-bottom: 14px;
  font-size: 11.5px;
}
.mail-meta-label {
  color: var(--text-lt); font-weight: 600;
}
.mail-meta-value { color: var(--text); }
.mail-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  white-space: pre-wrap;
  font-size: 12px; line-height: 1.65;
  color: var(--text);
  font-family: inherit;
}
.mail-actions {
  display: flex; gap: 8px;
  margin-top: 12px; justify-content: flex-end;
}

/* ================ Checklist ================ */
.checklist-stage {
  margin-bottom: 24px;
}
.checklist-stage-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.checklist-stage-num {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
  color: #fff;
}
.checklist-stage-num.s1 { background: var(--stage-1-text); }
.checklist-stage-num.s2 { background: var(--stage-2-text); }
.checklist-stage-num.s3 { background: var(--stage-3-text); }
.checklist-stage-num.s4 { background: var(--stage-4-text); }
.checklist-stage-num.s5 { background: var(--stage-5-text); }
.checklist-stage-name {
  font-size: 14px; font-weight: 700; color: var(--text);
  letter-spacing: -0.01em;
}
.checklist-stage-progress {
  margin-left: auto;
  font-size: 11px; color: var(--text-lt); font-weight: 600;
}
.checklist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 6px;
  transition: all 0.15s;
}
.checklist-item:hover {
  border-color: var(--primary-md);
  background: rgba(30,74,68,0.02);
}
.checklist-item.done {
  background: rgba(27,110,47,0.04);
  border-color: rgba(27,110,47,0.2);
}
.checklist-check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border-strong);
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.checklist-item.done .checklist-check {
  background: var(--success); border-color: var(--success);
  color: #fff;
}
.checklist-content { flex: 1; }
.checklist-item-name {
  font-size: 12.5px; font-weight: 700; color: var(--text);
}
.checklist-item.done .checklist-item-name {
  text-decoration: line-through;
  color: var(--text-lt);
}
.checklist-item-desc {
  font-size: 11px; color: var(--text-lt);
  margin-top: 2px;
}

/* ================ Empty State ================ */
.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-lt);
  font-size: 12px;
}
.empty-icon {
  font-size: 28px; margin-bottom: 8px; opacity: 0.4;
}

/* ================ Year View Grade Group ================ */
.grade-group {
  margin-bottom: 18px;
}
.grade-group-header {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 14px;
  border-radius: var(--radius-md);
  margin-bottom: 8px;
  color: #fff;
}
.grade-group-header.s { background: var(--grade-s); }
.grade-group-header.a { background: var(--grade-a); }
.grade-group-header.b { background: var(--grade-b); }
.grade-group-header.c { background: var(--grade-c); }
.grade-group-header.n { background: var(--grade-n); }
.grade-group-header.f { background: var(--grade-f); }
.grade-group-header.d { background: var(--grade-d); }
.grade-group-letter {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800;
}
.grade-group-name {
  font-size: 13px; font-weight: 700; letter-spacing: -0.01em;
}
.grade-group-stat {
  margin-left: auto;
  font-size: 11px; opacity: 0.9; font-weight: 500;
}
.grade-group-stat strong { font-weight: 700; }

.bar-cell {
  position: relative;
  min-width: 110px;
}
.bar-fill {
  position: absolute; left: 0; right: 100%;
  top: 50%; transform: translateY(-50%);
  height: 16px;
  background: var(--primary-lt);
  border-radius: 2px;
  z-index: 0;
}
.bar-text {
  position: relative; z-index: 1;
  padding: 0 8px;
}

/* ================ Trend Indicator ================ */
.trend {
  display: inline-flex; align-items: center;
  gap: 3px;
  font-size: 10.5px; font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
}
.trend.up { background: var(--success-lt); color: var(--success); }
.trend.down { background: var(--danger-lt); color: var(--danger); }
.trend.flat { background: var(--bg); color: var(--text-lt); }
.trend.new { background: var(--info-lt); color: var(--info); }

/* ================ Donut Chart ================ */
.donut-wrap {
  display: flex; align-items: center; gap: 24px;
  flex-wrap: wrap;
}
.donut {
  width: 180px; height: 180px;
  flex-shrink: 0;
}
.donut-legend {
  flex: 1; min-width: 200px;
  display: flex; flex-direction: column; gap: 6px;
}
.legend-row {
  display: grid;
  grid-template-columns: 14px 60px 1fr 70px;
  gap: 10px;
  align-items: center;
  padding: 4px 0;
  font-size: 11.5px;
}
.legend-mark {
  width: 10px; height: 10px; border-radius: 2px;
}
.legend-name { font-weight: 600; }
.legend-value {
  text-align: right; font-variant-numeric: tabular-nums;
  font-weight: 600; color: var(--text-md);
}

/* ================ Year View Top Tabs ================ */
.tab-bar {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  overflow-x: auto;
}
.tab {
  padding: 10px 16px;
  font-size: 12.5px; font-weight: 600;
  color: var(--text-lt);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

/* ================ Footer ================ */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-md);
  font-size: 12px; font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  transition: transform 0.3s ease;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* ================ Misc ================ */
.flex { display: flex; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.flex-wrap { flex-wrap: wrap; }
.text-md { color: var(--text-md); }
.text-lt { color: var(--text-lt); }
.text-xlt { color: var(--text-xlt); }
.text-accent { color: var(--accent); }
.text-primary { color: var(--primary); }
.text-success { color: var(--success); }
.text-warn { color: var(--warn); }
.text-danger { color: var(--danger); }
.fw-700 { font-weight: 700; }
.fw-600 { font-weight: 600; }
.fs-10 { font-size: 10px; }
.fs-11 { font-size: 11px; }
.fs-12 { font-size: 12px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.scroll-x { overflow-x: auto; }
.text-truncate {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

@media (max-width: 1100px) {
  .kanban { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  :root { --sidebar-w: 60px; }
  .nav-text, .nav-badge, .brand-name, .brand-sub, .nav-label, .sidebar-footer { display: none; }
  .nav-item { justify-content: center; padding: 12px 0; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .kanban { grid-template-columns: 1fr; }
  .process-flow { grid-template-columns: 1fr 1fr; gap: 8px; }
  .process-step::after { display: none; }
}

/* ============= 드래그 앤 드롭 ============= */
.kanban-card {
  user-select: none;
  -webkit-user-select: none;
}
.kanban-card:active { cursor: grabbing; }
.kanban-card[draggable="true"] { cursor: grab; }
.kanban-card.dragging {
  opacity: 0.4;
  transform: scale(0.98) rotate(-1deg);
}
.kanban-col.drag-over {
  background: var(--primary-lt);
  border-color: var(--primary-md);
  border-style: dashed;
}
.kanban-col.drag-over .kanban-col-header {
  color: var(--primary);
}
.kanban-card-actions {
  display: flex; gap: 6px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
}
.kanban-card-action {
  flex: 1;
  padding: 5px 8px;
  font-size: 10.5px; font-weight: 700;
  border-radius: 4px;
  background: var(--bg);
  color: var(--text-md);
  border: 1px solid var(--border);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.kanban-card-action:hover {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.kanban-card-action.success {
  background: var(--success-lt); color: var(--success); border-color: rgba(27,110,47,0.3);
}
.kanban-card-action.success:hover {
  background: var(--success); color: #fff; border-color: var(--success);
}
.drag-hint {
  font-size: 10.5px; color: var(--text-lt);
  text-align: center;
  padding: 8px;
  background: var(--primary-bg);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius-md);
  margin-top: 12px;
}
.drag-hint .accent { color: var(--accent); font-weight: 700; }

/* ============= 단계 이동 모달 입력 ============= */
.form-row {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 10px 14px;
  align-items: center;
  margin-bottom: 12px;
}
.form-label {
  font-size: 11px; font-weight: 700;
  color: var(--text-md);
  letter-spacing: 0.02em;
}
.form-label .req { color: var(--accent); }
.form-input {
  padding: 8px 12px;
  border-radius: var(--radius-md);
  font-size: 12.5px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  outline: none;
  width: 100%;
  font-family: inherit;
}
.form-input:focus { border-color: var(--primary-md); }
.form-textarea {
  min-height: 70px;
  resize: vertical;
  font-family: inherit;
  line-height: 1.5;
}
.form-actions {
  display: flex; gap: 8px;
  justify-content: flex-end;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  margin-top: 16px;
}
.form-banner {
  background: var(--primary-bg);
  border-left: 3px solid var(--primary);
  padding: 10px 14px;
  border-radius: 4px;
  margin-bottom: 16px;
  font-size: 11.5px;
  color: var(--text-md);
}
.form-banner.warn {
  background: var(--warn-lt);
  border-left-color: var(--warn);
}
.form-banner.success {
  background: var(--success-lt);
  border-left-color: var(--success);
}
.form-banner strong { color: var(--text); }

/* ============= 커리큘럼 ============= */
.curriculum-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  overflow-x: auto;
}
.curriculum-tab {
  padding: 11px 18px;
  font-size: 13px; font-weight: 600;
  color: var(--text-lt);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition: all 0.15s;
  letter-spacing: -0.01em;
}
.curriculum-tab:hover { color: var(--text); }
.curriculum-tab.active {
  color: var(--primary);
  border-bottom-color: var(--accent);
  font-weight: 700;
}
.curriculum-step {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
}
.curriculum-step-header {
  display: flex; align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: linear-gradient(90deg, var(--primary) 0%, var(--primary-md) 100%);
  color: #fff;
  cursor: pointer;
  transition: filter 0.15s;
}
.curriculum-step-header:hover { filter: brightness(1.05); }
.curriculum-step-num {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.curriculum-step-info { flex: 1; }
.curriculum-step-title {
  font-size: 15px; font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.3;
  margin-bottom: 2px;
}
.curriculum-step-meta {
  font-size: 11px;
  opacity: 0.85;
}
.curriculum-step-toggle {
  font-size: 14px; opacity: 0.7;
  transition: transform 0.2s;
}
.curriculum-step.expanded .curriculum-step-toggle {
  transform: rotate(180deg);
}
.curriculum-step-body {
  display: none;
  padding: 8px;
  background: var(--bg);
}
.curriculum-step.expanded .curriculum-step-body { display: block; }
.curriculum-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 6px;
}
.curriculum-item-header {
  display: flex; align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}
.curriculum-item-no {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
  line-height: 1;
}
.curriculum-item-title {
  font-size: 13px; font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
  flex: 1;
  line-height: 1.4;
}
.curriculum-item-owner {
  font-size: 10px; font-weight: 700;
  background: var(--primary-bg);
  color: var(--primary);
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
.curriculum-item-grid {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 6px 14px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  font-size: 11.5px;
}
.curriculum-item-key {
  font-weight: 700; color: var(--text-lt);
  letter-spacing: 0.02em;
}
.curriculum-item-val {
  color: var(--text-md);
  white-space: pre-wrap;
  line-height: 1.55;
}
.curriculum-item-val.check {
  background: var(--warn-lt);
  border-left: 3px solid var(--warn);
  padding: 6px 10px;
  border-radius: 4px;
  color: var(--text);
}

/* QnA */
.qna-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  margin-bottom: 8px;
}
.qna-card-head {
  display: flex; align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.qna-no {
  width: 24px; height: 24px;
  border-radius: 4px;
  background: var(--primary);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.qna-step {
  font-size: 10px; font-weight: 700;
  background: var(--primary-bg);
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.02em;
}
.qna-cat {
  font-size: 10px; font-weight: 600;
  background: var(--accent-lt);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 10px;
}
.qna-q {
  font-size: 13px; font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.5;
  letter-spacing: -0.01em;
}
.qna-q::before {
  content: 'Q. ';
  color: var(--accent);
  font-weight: 800;
  margin-right: 2px;
}
.qna-a {
  font-size: 12px;
  color: var(--text-md);
  line-height: 1.6;
  background: var(--bg);
  padding: 10px 14px;
  border-left: 3px solid var(--primary);
  border-radius: 4px;
  white-space: pre-wrap;
}
.qna-a::before {
  content: 'A. ';
  color: var(--primary);
  font-weight: 800;
  margin-right: 2px;
}
.qna-search-bar {
  margin-bottom: 14px;
}

/* ============= 질문서 발송/회신 미니 체크 칩 (1차미팅 대기 카드 안) ============= */
.kanban-card-quest-row {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.quest-chip {
  flex: 1;
  font-size: 10px;
  padding: 4px 6px;
  border-radius: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-md);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-weight: 600;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: inherit;
}
.quest-chip:hover {
  background: var(--info-lt);
  border-color: var(--info);
  color: var(--info);
  transform: translateY(-1px);
}
.quest-chip.done {
  background: var(--success-lt);
  border-color: rgba(46, 125, 50, 0.3);
  color: var(--success);
}
.quest-chip.done:hover {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
}

/* ============= 카드 레이아웃 개선 (현장/미팅 정보) ============= */
.kanban-card-name-row {
  display: flex; align-items: flex-start;
  gap: 6px;
  margin-bottom: 4px;
}
.kanban-card-name-row .kanban-card-name {
  flex: 1;
  margin-bottom: 0;
}
.kanban-card-hurdle-btn {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  opacity: 0.5;
  line-height: 1;
}
.kanban-card:hover .kanban-card-hurdle-btn { opacity: 1; }
.kanban-card-hurdle-btn:hover {
  background: var(--warn-lt);
  border-color: var(--warn);
  transform: scale(1.1);
  opacity: 1;
}

.kanban-card-info {
  font-size: 10.5px;
  padding: 4px 8px;
  border-radius: 4px;
  margin-top: 5px;
  line-height: 1.4;
  display: flex; align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.kanban-card-info.schedule {
  background: var(--info-lt);
  color: var(--info);
  border-left: 2px solid var(--info);
}
.kanban-card-info.done {
  background: var(--success-lt);
  color: var(--success);
  border-left: 2px solid var(--success);
}
.kanban-card-info strong { font-weight: 700; }

.kanban-card-site {
  display: flex; align-items: center;
  gap: 5px;
  margin-top: 6px;
  padding: 5px 9px;
  background: var(--accent-lt);
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  border-left: 2px solid var(--accent);
  line-height: 1.4;
  transition: all 0.15s;
}
.kanban-card-site:hover {
  background: var(--accent);
  color: #fff;
}
.kanban-card-site .site-count {
  background: var(--accent);
  color: #fff;
  padding: 0 5px;
  border-radius: 8px;
  font-size: 9px;
  font-weight: 700;
  margin-left: auto;
}
.kanban-card-site:hover .site-count {
  background: rgba(255,255,255,0.25);
}

/* ============= 상세 모달 현장 행 ============= */
.site-row {
  display: flex;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg);
  border-left: 2px solid var(--accent);
  border-radius: 3px;
  margin-bottom: 5px;
  font-size: 11.5px;
  color: var(--text);
  line-height: 1.5;
  align-items: flex-start;
}
.site-row-no {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  line-height: 1;
}
.site-row-text {
  flex: 1;
  white-space: pre-wrap;
  padding-top: 2px;
}

/* ============= 카드 액션 버튼 색상 추가 ============= */
.kanban-card-action.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.kanban-card-action.primary:hover {
  background: var(--primary-md); border-color: var(--primary-md); color: #fff;
}
.kanban-card-action.accent {
  background: var(--accent-lt);
  color: var(--accent);
  border-color: rgba(196,30,36,0.3);
}
.kanban-card-action.accent:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* ============= 협력업체 리스트 view tabs (가시성 강화) ============= */
.pl-view-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 18px;
}
.pl-view-tab {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--bg-card);
  border: 2.5px solid var(--primary);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: inherit;
  position: relative;
  box-shadow: 0 2px 6px rgba(20,33,61,0.08);
}
.pl-view-tab:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(20,33,61,0.15);
}
.pl-view-tab:hover .pl-tab-name {
  color: var(--accent-deep);
}
.pl-view-tab.active {
  background: linear-gradient(135deg, #14213D 0%, #1F2F50 100%);
  border-color: var(--accent);
  border-width: 2.5px;
  box-shadow: 0 4px 14px rgba(20,33,61,0.3);
}
.pl-view-tab.active .pl-tab-name,
.pl-view-tab.active .pl-tab-sub {
  color: #fff !important;
}
.pl-view-tab.active .pl-tab-icon { filter: brightness(1.5); }
.pl-view-tab.active .pl-tab-count {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent-deep);
}
.pl-view-tab.active::after {
  content: '✓';
  position: absolute;
  top: 8px; right: 10px;
  width: 22px; height: 22px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
}
.pl-tab-icon { font-size: 26px; flex-shrink: 0; }
.pl-tab-text { flex: 1; min-width: 0; }
.pl-tab-name {
  font-size: 15px; font-weight: 800;
  color: var(--primary);
  margin-bottom: 3px;
  letter-spacing: -0.2px;
}
.pl-tab-sub {
  font-size: 11px;
  color: var(--text-md);
}
.pl-tab-count {
  font-size: 20px; font-weight: 800;
  color: var(--primary);
  background: var(--accent-lt);
  padding: 8px 14px;
  border-radius: 8px;
  min-width: 56px;
  text-align: center;
  flex-shrink: 0;
  border: 1.5px solid var(--accent);
}

/* ============= 지역 필터 (다중 선택) ============= */
.pl-filter {
  background: var(--bg-card);
  border: 1.5px solid var(--primary);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.pl-region-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.pl-region-tab {
  padding: 6px 12px;
  background: #fff;
  border: 1.5px solid var(--border-strong);
  border-radius: 20px;
  font-size: 11.5px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text);
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: 600;
}
.pl-region-tab:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-1px);
}
.pl-region-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  box-shadow: 0 2px 6px rgba(20,33,61,0.2);
}
.pl-region-tab.clear-btn {
  background: var(--accent-lt);
  border-color: var(--accent);
  color: var(--accent-deep);
  font-weight: 700;
}
.pl-region-tab.clear-btn:hover {
  background: var(--accent);
  color: #fff;
}
.pl-region-count {
  background: rgba(255,255,255,0.25);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
}
.pl-region-tab:not(.active) .pl-region-count {
  background: var(--primary);
  color: #fff;
}
.pl-region-tab.clear-btn .pl-region-count { display: none; }
.pl-region-active-info {
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--accent-lt);
  border-radius: 6px;
  font-size: 11px;
  color: var(--accent-deep);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.pl-region-active-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent);
  color: #fff;
  padding: 3px 8px 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
}
.pl-region-active-chip button {
  background: rgba(255,255,255,0.3);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 16px; height: 16px;
  cursor: pointer;
  font-size: 9px;
  font-weight: 800;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.pl-region-active-chip button:hover { background: rgba(255,255,255,0.5); }

.pl-search-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pl-table { font-size: 11.5px; }
.pl-table th {
  background: var(--primary);
  color: #fff;
  font-size: 11px;
  padding: 10px 8px;
  letter-spacing: 0.02em;
}
.pl-table td {
  padding: 8px 8px;
  border-bottom: 1px solid var(--border);
}
.pl-table tbody tr:hover { background: var(--accent-lt); }
.pl-table tbody tr.row-added { background: var(--success-lt); }
.pl-table tbody tr.row-modified { background: var(--accent-lt); }

.pl-region-pill {
  display: inline-block;
  padding: 2px 8px;
  background: var(--primary);
  color: #fff;
  border-radius: 8px;
  font-size: 10.5px;
  font-weight: 700;
  margin-right: 3px;
}

/* ============= 단계 생략 표시 ============= */
.detail-stage-row.skipped {
  background: repeating-linear-gradient(
    45deg,
    var(--bg),
    var(--bg) 6px,
    var(--bg-soft) 6px,
    var(--bg-soft) 12px
  );
  border-left-color: var(--text-lt);
  opacity: 0.7;
}
.detail-stage-row.skipped .detail-stage-label {
  text-decoration: line-through;
  color: var(--text-lt);
}
.detail-skip-toggle {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 5px 10px;
  background: var(--bg);
  border: 1px dashed var(--text-lt);
  border-radius: 5px;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-lt);
  user-select: none;
  transition: all 0.15s;
}
.detail-skip-toggle:hover {
  border-color: var(--accent);
  color: var(--accent-deep);
}
.detail-skip-toggle input { display: none; }
.detail-skip-toggle.active {
  background: var(--text-lt);
  color: #fff;
  border-style: solid;
  border-color: var(--text-lt);
}
.detail-done-toggle.disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* ============= 현장 편집 모달 ============= */
.site-edit-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
  margin-bottom: 8px;
  padding: 8px;
  background: var(--bg);
  border-radius: 6px;
  border-left: 3px solid var(--accent);
}
.site-edit-no {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  align-self: flex-start;
}
.site-edit-input {
  flex: 1;
  resize: vertical;
  min-height: 50px;
  font-size: 11.5px;
  font-family: inherit;
}

/* ============= MOU 자료 카드 ============= */
.doc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 12px;
}
.doc-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all 0.15s;
}
.doc-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-md);
}
.doc-icon {
  font-size: 32px;
  flex-shrink: 0;
  line-height: 1;
}
.doc-info {
  flex: 1;
  min-width: 0;
}
.doc-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
  word-break: break-word;
}
.doc-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 10.5px;
  color: var(--text-lt);
  margin-bottom: 2px;
}
.doc-filename {
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: monospace;
  word-break: break-all;
}
.doc-size {
  font-weight: 600;
}
.doc-date {
  font-size: 10px;
  color: var(--text-xlt);
  margin-top: 4px;
}
.doc-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}

/* ============= 등급 수정 모달 - 등급 라디오 버튼 그룹 ============= */
.grade-radio-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.grade-radio-btn {
  padding: 6px 12px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  color: var(--text-md);
  transition: all 0.15s;
  min-width: 50px;
}
.grade-radio-btn:hover {
  border-color: var(--primary);
  transform: translateY(-1px);
}
.grade-radio-btn.active {
  border-color: var(--primary);
  background: var(--primary-bg);
  box-shadow: 0 0 0 2px var(--primary);
  font-weight: 700;
}
.grade-radio-btn.active-empty {
  border-color: var(--text-lt);
  background: var(--bg);
  color: var(--text-lt);
  font-weight: 700;
}

/* ============= 등급 필터 그리드 (전체 + 6개 등급) ============= */
.grade-filter-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.grade-filter-grid .kpi-card {
  cursor: pointer;
  border: 2px solid var(--border);
  transition: all 0.15s;
}
.grade-filter-grid .kpi-card:hover {
  border-color: var(--primary);
  transform: translateY(-1px);
}
.grade-filter-grid .kpi-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
.grade-filter-grid .grade-filter-all.active {
  background: var(--primary);
}
.grade-filter-grid .grade-filter-all.active *:not(.kpi-unit) {
  color: #fff !important;
}

/* 등급 테이블 26년 강조 */
.grade-table th {
  font-size: 11px;
}
.grade-table tbody tr:hover {
  background: var(--accent-lt);
}

/* ============= 인라인 편집 스타일 (상세 모달) ============= */
.detail-section {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 14px;
}
.detail-section-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.detail-stages {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.detail-stage-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--bg-card);
  border-radius: 6px;
  border-left: 3px solid var(--border);
  transition: border-left-color 0.15s;
}
.detail-stage-row:hover {
  border-left-color: var(--primary);
}
.detail-stage-label {

 완료) ③.\n    \"현장 준공일로부터 5년간의 시공 하자와\n    자재 불량에 대한 보증은 유효하다.\"","check":"※ 기존 계약서 변경 불가\n  → 별도 하자처리 확약서로 보완 (STEP C)","owner":"신명희"},{"no":"②","name":"[신규업체] 컨설팅 계약서 신규 수정 ★","activity":"신규업체는 하자 신청 시점에 컨설팅 계약서를 신규로 수정·작성","detail":"★ 변경 작성 내용 (260424 적용)\n  - 제3조 2-2:\n    \"시공품질상\" → \"제품 품질상\" 하자\n  - 제8조: 삭제\n★ 검토 중 결정 사항 (260423)\n  - 첫페이지 보증기간: 기존 5년 그대로 유지\n    (3년→3년/2년 분리 X, 문제 소지 발생 우려)\n  - 별도 3년 확약서는 추가 안전장치로 안내","check":"※ 기존 5년 보증 그대로 유지하되\n  별도 확약서로 추가 안전장치 마련","owner":"신명희"}]},{"num":"C","title":"하자처리 확약서","fullLabel":"STEP C 하자처리 확약서","items":[{"no":"①","name":"하자처리 확약서 작성 (간소화) ★","activity":"계약 체결 이후 효력 발생일 기준을 하자이행보증증권 발급일로 설정\n→ 시공사가 예상 발급일을 직접 기재","detail":"★ 효력 발생일 = 하자이행보증증권 발급일\n  - 발급일은 시공사 측에서 예상하여 기재\n★ 별도 확약서에는 년도 표기 제외\n  (이유: 기존 컨설팅계약서에 5년 표기되어 있어\n   별도 확약서에서 중복 표기 시 혼선 발생)\n※ 양식 260424 배포완료 (기존업체용·신규업체용 동일)","check":"※ 기존업체 / 신규업체 모두 동일 양식 사용","owner":"신명희"}]},{"num":"D","title":"확약서 진행","fullLabel":"STEP D 확약서 진행","items":[{"no":"①","name":"확약서 송부·회수","activity":"시공사에 확약서 양식 송부 → 작성·날인 후 회수","detail":"※ 효력 발생일(하자이행보증증권 발급일) 기재 확인\n※ 시공사 직인·서명 확인","check":"※ 회수 후 사본 파일 철\n※ 원본은 별도 보관","owner":"신명희 + 서비스운영팀"},{"no":"②","name":"하자 처리 진행 모니터링","activity":"확약서 효력 발생 후 실제 하자 처리 진행 상황 모니터링","detail":"※ 시공 준공일~하자보증 종료일 사이 처리\n※ 하자 처리 비용·일정·결과 기록","check":"※ 대시보드 등록 (STEP 5 메인 트랙과 연계)\n※ 하자 처리 완료 후 결과 보고서 작성","owner":"신명희"}]}],"qna":[{"no":"1","step":"STEP 3","category":"물품공급 계약서","q":"물품공급계약서는 MOU 체결 시점에 작성? OR 첫 현장 발생 시 작성?","a":"→ 첫 현장 발생 시점에 작성한다.\n   (MOU 체결만 하고 공사 안 하는 업체가 다수이며,\n    물품공급계약서는 구체적 거래조건이 명시되는 서류이므로)"},{"no":"2","step":"STEP 3","category":"물품공급 계약서","q":"첫 현장 발생 시점이 공고문 뜨고 낙찰된 시점인지? 낙찰되고 바로 공사 진행되는 경우 급함","a":"→ 포괄적 물품공급계약서를 1회만 작성해 두고,\n   이후는 발주서로만 공사 진행.\n   계약서에 \"구체적인 공급 목적물 및 대금은\n   개별 발주서를 따른다\" 명시."},{"no":"3","step":"STEP 3","category":"물품공급 계약서","q":"물품공급계약서가 연간 얼마의 한도금액을 설정해서 한 번 작성하는 것인지?","a":"→ 예상 거래금액을 한도로 설정한 포괄계약을\n   1회 작성, 1년 단위로 갱신."},{"no":"4","step":"STEP 2 + STEP 3","category":"공증","q":"공증의 경우 컨설팅계약서·공급계약서가 필요한데,\n현장별 보증을 가입한다면 공급계약서도 현장별로 작성?","a":"→ 원칙: 보증기관에서 건별 계약관계·리스크를 확인해야\n   하므로 공급계약서도 현장별 작성이 원칙.\n→ 대체 가능: 포괄계약서 하의 현장별 부속합의서\n   또는 구체적 현장명세 발주서가 명확하면 대체 가능."},{"no":"5","step":"STEP 4","category":"미납·공증","q":"직영공사 중 기술자재형 공사로 진행 시 낙찰금액의 2% 자재 구매 → 미납 발생\n→ 공증 시 물품공급계약서를 어떻게 활용? 건별 작성해야 하는지?","a":"→ 건별 작성 부담 줄이기 위해\n   기본 물품공급계약서를 연간 1회 작성.\n→ 미납 발생 시 4종 세트로 공증 활용:\n   ① 기본계약서 + ② 해당 현장 발주서\n   + ③ 거래명세서 + ④ 세금계산서"},{"no":"6","step":"STEP 4","category":"미납·공증","q":"미납 금액이 소액(예: 50만원)인 경우에도 공증을 진행할 것인지?","a":"→ 공증수수료/법무비용 고려 시 비효율적.\n   통상 300만원 이상부터 공증 실익 있음.\n   → 기준을 300만원으로 설정."},{"no":"7","step":"STEP 4","category":"미납·공증","q":"공증은 미납 발생 시 진행하는데,\n물품공급계약서가 공증에 어떻게 활용되는지?","a":"→ 공증(금전소비대차 공증 또는 약속어음 공증) 작성 시,\n   채무자가 채무를 부담한다는 것을 증명하는\n   \"채권 발생의 원인서류\"로 물품공급계약서가 제출·활용.\n→ 계약서가 있어야 채권채무 관계를 명확히 입증할 수 있고,\n   이를 근거로 공증인이 집행력 있는 공정증서를 작성.\n   (공증은 컨설팅계약서로 진행)"},{"no":"8","step":"STEP 3","category":"물품공급 계약서","q":"공급계약서는 모든 현장에 작성해야 하고\n시공사별로 금액이 다 달라져야 하는지?\n(여신: 신용도 조회 후 한도 설정 가능 / 직납: 한도는?)","a":"→ 시공사별로 재무 규모와 거래량이 다르므로\n   한도 금액은 시공사별로 다르게 설정."},{"no":"9","step":"STEP 5","category":"대시보드","q":"MOU 체결 이후 거래방식 선택 완료 시,\n관리 대시보드를 운영할 것인지?","a":"→ 운영함. (담당: 신명희)"},{"no":"10","step":"STEP 4","category":"ERP","q":"ERP로 여신관리가 가능하지만 유통팀 협조 필요","a":"→ 유통팀에서 진행."},{"no":"11","step":"STEP 4","category":"ERP· 대시보드","q":"직납거래(익월말결제)의 경우 시공사별 자재 발주금액 관리는\n어디서? (대시보드? ERP API 연결? ERP 매일 조회? 한도 잔액 관리?)","a":"→ 검토 중.\n   (대시보드 구축 또는 ERP API 연동 방식 비교)"},{"no":"12","step":"STEP 2","category":"보증보험","q":"신규 시공사는 신용도가 낮을 것으로 예상되는데,\n연간 최대 거래 한도 금액을 얼마로 잡아야 하는지?","a":"→ 서울보증보험 등에서 발급하는\n   이행(상품판매)보증보험증권 징구 금액 이내로\n   한도 부여.\n   또는 선급금(현금) 결제 조건 요구."},{"no":"13","step":"STEP 3","category":"물품공급 계약서","q":"물품공급계약서는 시공사와 넷폼 간 자재거래 한도를\n설정하는 내용으로 연간 한 번 작성?","a":"→ \"연간 거래 한도금액 OOO원 이내에서\n   개별 발주서에 따라 자재를 공급한다\"는 내용의\n   포괄적 기본 물품공급계약서를 1년 단위 1회 작성."},{"no":"14","step":"STEP 2 + STEP 4","category":"보증보험· ERP","q":"신용도 조회 시 5,000만원 보증 가능 시\n딱 5,000만원까지만 여신? 어느 정도 여유한 // 숫자 포맷
const fmt = (n) => (n == null) ? '—' : n.toLocaleString('ko-KR');
const fmtKR = (n) => {
  if (n == null || n === 0) return '0';
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000) return (n / 10000).toFixed(0) + '만';
  return n.toLocaleString('ko-KR');
};
const fmtDate = (iso, fallback) => {
  if (iso) {
    const [y, m, d] = iso.split('-');
    return `${y.slice(2)}.${m}.${d}`;
  }
  return fallback || '—';
};
const todayMs = Date.now();
const daysSince = (iso) => {
  if (!iso) return null;
  const t = new Date(iso).getTime();
  return Math.floor((todayMs - t) / 86400000);
};

// ============ Override System ============
// localStorage 'mouOverrides' = { [companyName]: { ...changes } }
// init 시 적용 + 변경 시 저장 + 메모리 데이터 업데이트
//
// Stage 정의 (사용자 정의 5단계 칸반):
//   0 = 질문서 (질문서 발송/회신 처리 단계 — 회신 안 받음)
//   1 = 1차미팅 대기 (회신 받음, 1차미팅 일정 조율/진행 전)
//   2 = 1차미팅 완료 (m1Done, m2Scheduled 없음)
//   3 = 2차미팅 대기 (m2Scheduled 있음, m2Done 없음)
//   4 = 2차미팅 완료 (m2Done, mouDone 없음)
//   5 = MOU 체결 (mouDone)
function recalcStage(c) {
  if (c.mouDone) return 5;
  if (c.m2Done || c.m2Skipped) return 4;
  if (c.m2Scheduled) return 3;
  if (c.m1Done || c.m1Skipped) return 2;
  if (c.qReplyDone || c.qReplySkipped || c.m1Scheduled) return 1;
  return 0;  // 질문서 단계 (발송 전 또는 발송 후 회신 대기)
}

// 기존 데이터에 신규 필드 (m1Scheduled, m1Owner, m2Scheduled, m2Owner, *Skipped) 보장
function ensureNewFields() {
  DATA.newMou.forEach(c => {
    if (c.m1Scheduled === undefined) c.m1Scheduled = null;
    if (c.m1ScheduledLabel === undefined) c.m1ScheduledLabel = null;
    if (c.m1Owner === undefined) c.m1Owner = null;
    if (c.m2Scheduled === undefined) c.m2Scheduled = null;
    if (c.m2ScheduledLabel === undefined) c.m2ScheduledLabel = null;
    if (c.m2Owner === undefined) c.m2Owner = null;
    if (c.qSentSkipped === undefined) c.qSentSkipped = false;
    if (c.qReplySkipped === undefined) c.qReplySkipped = false;
    if (c.m1Skipped === undefined) c.m1Skipped = false;
    if (c.m2Skipped === undefined) c.m2Skipped = false;
  });
}

// 현장 정보 파싱 (줄바꿈/세미콜론으로 여러 현장 분리)
function parseSites(siteText) {
  if (!siteText) return [];
  return String(siteText).split(/[\n;]+/).map(s => s.trim()).filter(s => s);
}

function applyOverrides() {
  ensureNewFields();
  const overrides = lsGet('mouOverrides', {});
  DATA.newMou.forEach(c => {
    const o = overrides[c.company];
    if (o) {
      Object.assign(c, o);
      c.stage = recalcStage(c);
      c._modified = true;
    } else {
      // override 없는 항목도 stage 재계산 (새 stage 시스템 적용)
      c.stage = recalcStage(c);
    }
  });
  recalcMeta();
}

function saveOverride(company, changes) {
  const overrides = lsGet('mouOverrides', {});
  if (!overrides[company]) overrides[company] = {};
  Object.assign(overrides[company], changes);
  lsSet('mouOverrides', overrides);
  const c = DATA.newMou.find(x => x.company === company);
  if (c) {
    Object.assign(c, changes);
    c.stage = recalcStage(c);
    c._modified = true;
  }
  recalcMeta();
}

function recalcMeta() {
  const m = DATA.meta;
  m.newMouDone = DATA.newMou.filter(c => !c.hurdle && c.mouDone).length;
  m.newMouPending = DATA.newMou.filter(c => !c.hurdle && !c.mouDone).length;
  m.newMouHurdle = DATA.newMou.filter(c => c.hurdle).length;
  m.newMouActive = DATA.newMou.filter(c => !c.hurdle).length;
  // 사이드바/헤더 업데이트
  const e = (id) => document.getElementById(id);
  if (e('badge-pending')) e('badge-pending').textContent = m.newMouPending;
  if (e('badge-done')) e('badge-done').textContent = m.newMouDone;
  if (e('badge-hurdle')) e('badge-hurdle').textContent = m.newMouHurdle;
  if (e('headerStatMou')) e('headerStatMou').textContent = m.newMouActive;
}

// ============ Drag & Drop ============
let dragState = { company: null };

function dragStart(ev, company) {
  dragState.company = company;
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', company);
  ev.currentTarget.classList.add('dragging');
}

function dragEnd(ev) {
  ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kanban-col.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragState.company = null;
}

function dragOver(ev) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  ev.currentTarget.classList.add('drag-over');
}

function dragLeave(ev) {
  if (!ev.currentTarget.contains(ev.relatedTarget)) {
    ev.currentTarget.classList.remove('drag-over');
  }
}

function drop(ev, targetStage) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  const company = ev.dataTransfer.getData('text/plain') || dragState.company;
  if (!company) return;
  const c = DATA.newMou.find(x => x.company === company);
  if (!c) return;
  if (c.stage === targetStage) return;
  showStageMoveModal(company, targetStage);
}

// ============ Stage Move Modal ============
function showStageMoveModal(company, targetStage) {
  const c = DATA.newMou.find(x => x.company === company);
  if (!c) return;
  const currentStage = c.stage;
  if (currentStage === targetStage) return;
  
  const isForward = targetStage > currentStage;
  const isComplete = targetStage === 5;
  const today = new Date().toISOString().slice(0, 10);
  
  let formHtml = '';
  if (isForward) {
    // 앞으로 이동 - 빈 단계들 모두 입력
    const stagesToFill = [];
    for (let s = currentStage + 1; s <= targetStage; s++) {
      stagesToFill.push(s);
    }
    
    formHtml = `
      <div class="form-banner ${isComplete ? 'success' : ''}">
        <strong>${esc(company)}</strong>의 진행 단계를 
        <strong>${currentStage}단계 (${esc(STAGE_NAMES[currentStage].label)})</strong>에서 
        <strong>${targetStage}단계 (${esc(STAGE_NAMES[targetStage].label)})</strong>로 이동합니다.
        ${stagesToFill.length > 1 ? `<br>중간 단계 정보를 함께 입력해주세요.` : '<br>아래 정보를 입력해주세요.'}
      </div>
      ${stagesToFill.map(s => {
        const def = STAGE_TARGET_FIELDS[s];
        if (!def) return '';
        return `
          <div style="background:var(--bg);padding:10px 14px;border-radius:6px;margin-bottom:10px">
            <div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:8px">
              ${def.icon} STEP ${s} → ${esc(def.label)}
            </div>
            ${def.fields.map(f => {
              if (f.type === 'date') {
                const defaultVal = (s === 2 && c.m1Scheduled) ? c.m1Scheduled
                                 : (s === 4 && c.m2Scheduled) ? c.m2Scheduled
                                 : today;
                return `
                  <div class="form-row">
                    <div class="form-label">${esc(f.label)} ${f.required ? '<span class="req">*</span>' : ''}</div>
                    <input type="date" class="form-input" id="sf-${s}-${f.key}" value="${defaultVal}" />
                  </div>
                `;
              } else {
                const defaultVal = (s === 3 && c.m1Owner) ? c.m1Owner : '';
                return `
                  <div class="form-row">
                    <div class="form-label">${esc(f.label)} ${f.required ? '<span class="req">*</span>' : ''}</div>
                    <input type="text" class="form-input" id="sf-${s}-${f.key}" placeholder="${esc(f.placeholder || '')}" value="${esc(defaultVal)}" />
                  </div>
                `;
              }
            }).join('')}
          </div>
        `;
      }).join('')}
      <div class="form-row">
        <div class="form-label">📌 비고/메모</div>
        <textarea class="form-input form-textarea" id="moveNote" placeholder="단계 진행 메모 (선택사항)"></textarea>
      </div>
      ${isComplete ? `
        <div class="form-banner warn">
          ⚠️ MOU 체결이 완료되면 자동으로 <strong>'MOU 체결완료'</strong> 탭으로 이관됩니다.
        </div>
      ` : ''}
      <div class="form-actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn ${isComplete ? 'accent' : 'primary'}" onclick="confirmStageMove('${esc(company).replace(/'/g, "\\'")}',${targetStage})">
          ${isComplete ? '✓ MOU 체결 완료' : '✓ ' + STAGE_NAMES[targetStage].label + ' 이동'}
        </button>
      </div>
    `;
  } else {
    // 뒤로 이동
    formHtml = `
      <div class="form-banner warn">
        <strong>${esc(company)}</strong>의 진행 단계를 뒤로 이동합니다.<br>
        ${currentStage}단계 → <strong>${targetStage}단계 (${esc(STAGE_NAMES[targetStage].label)})</strong>
        <br>되돌리는 단계의 진행 데이터는 제거되지만 날짜는 보존됩니다.
      </div>
      <div class="form-row">
        <div class="form-label">📌 사유</div>
        <textarea class="form-input form-textarea" id="moveNote" placeholder="뒤로 이동하는 사유 (예: 재진행 필요, 입력 오류 등)"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn accent" onclick="confirmStageMoveBack('${esc(company).replace(/'/g, "\\'")}',${targetStage})">단계 되돌리기</button>
      </div>
    `;
  }
  
  openModal(`${isComplete ? '🎉 MOU 체결 처리' : '🔄 단계 이동'}`, formHtml);
}

function confirmStageMove(company, targetStage) {
  const c = DATA.newMou.find(x => x.company === company);
  if (!c) return;
  const changes = {};
  for (let s = c.stage + 1; s <= targetStage; s++) {
    const def = STAGE_TARGET_FIELDS[s];
    if (!def) continue;
    for (const f of def.fields) {
      const inp = document.getElementById(`sf-${s}-${f.key}`);
      if (!inp) continue;
      const v = inp.value;
      if (f.required && !v) {
        alert(`${f.label}을(를) 입력해주세요.`);
        return;
      }
      if (f.type === 'date' && v) {
        changes[f.key] = v;
        changes[f.key + 'Label'] = v.slice(2).replace(/-/g, '.');
        if (f.doneFlag) changes[f.doneFlag] = true;
      } else if (f.type === 'text') {
        changes[f.key] = v.trim() || null;
      }
    }
  }
  // 비고
  const noteEl = document.getElementById('moveNote');
  const note = noteEl ? noteEl.value.trim() : '';
  if (note) {
    const today = new Date().toISOString().slice(2, 10).replace(/-/g, '.');
    changes.note = (c.note ? c.note + ' / ' : '') + `[${today}] ${note}`;
  }
  
  saveOverride(company, changes);
  closeModal();
  
  if (targetStage === 5) {
    // MOU 체결 → 협력업체 리스트 + 등급 자동 추가
    syncCompletedMouToPartnerListAndGrades(company);
    toast(`🎉 ${company} MOU 체결 완료! 협력업체 리스트와 등급에 추가되었습니다.`);
    setTimeout(() => setView('moudone'), 700);
  } else {
    toast(`✓ ${company} → ${STAGE_NAMES[targetStage].label} 이동 완료`);
    rerenderCurrent();
  }
}

// ============ MOU 체결 → 협력업체 리스트 + 등급 자동 동기화 ============
function syncCompletedMouToPartnerListAndGrades(companyName) {
  const c = DATA.newMou.find(x => x.company === companyName);
  if (!c) return;
  
  // 1. 협력업체 리스트 (3가지 view 모두) — 신규 추가 (이미 있으면 skip)
  ['internal', 'contractor', 'external'].forEach(view => {
    if (!DATA.partnerList || !DATA.partnerList[view]) return;
    const adds = lsGet('partnerList_' + view + '_adds', []);
    const existing = DATA.partnerList[view].find(p => p.company === companyName);
    const existingAdd = adds.find(p => p.company === companyName);
    if (existing || existingAdd) return;  // 중복 skip
    
    const newEntry = {
      company: companyName,
      region: c.region || '',  // MOU 데이터에 지역이 있으면
      ceo: '', phone: '', address: '',
    };
    if (view === 'internal') {
      newEntry.code = '';
      newEntry.bizno = '';
      newEntry.fax = '';
      newEntry.email = '';
      newEntry.mou = c.mouLabel || ('ㅇ' + new Date().toISOString().slice(2, 10).replace(/-/g, '.'));
      newEntry.capital = '';
      newEntry.note = `MOU 체결로 자동 추가됨 (${new Date().toISOString().slice(0, 10)})`;
    } else if (view === 'contractor') {
      newEntry.fax = '';
    }
    
    adds.push(newEntry);
    lsSet('partnerList_' + view + '_adds', adds);
  });
  
  // 2. 등급 데이터에 N등급 (신규협약)으로 추가 — 이미 있으면 skip
  const grades = ['S', 'A', 'B', 'C', 'N', 'F'];
  let alreadyExists = false;
  grades.forEach(g => {
    if (DATA.grades[g].find(x => x.name === companyName)) alreadyExists = true;
  });
  
  if (!alreadyExists) {
    const newGrade = {
      name: companyName,
      sales: 0,
      y25: '',
      y24: '',
      y23: '',
      y22: '',
      y26: '',
      _added: true,
      _fromMou: true,
    };
    if (!DATA.grades['N']) DATA.grades['N'] = [];
    DATA.grades['N'].push(newGrade);
    
    // localStorage gradeAdds에도 저장
    const gradeAdds = lsGet('gradeAdds', []);
    gradeAdds.push({ ...newGrade, grade: 'N' });
    lsSet('gradeAdds', gradeAdds);
    
    // meta 재계산
    if (typeof recalcGradeMeta === 'function') recalcGradeMeta();
  }
}

function confirmStageMoveBack(company, targetStage) {
  const c = DATA.newMou.find(x => x.company === company);
  if (!c) return;
  const changes = {};
  // stage별 done flag 해제
  for (let s = targetStage + 1; s <= c.stage; s++) {
    if (s === 2) changes.m1Done = false;
    if (s === 3) changes.m2Scheduled = null;
    if (s === 4) changes.m2Done = false;
    if (s === 5) changes.mouDone = false;
  }
  const noteEl = document.getElementById('moveNote');
  const note = noteEl ? noteEl.value.trim() : '';
  if (note) {
    const today = new Date().toISOString().slice(2, 10).replace(/-/g, '.');
    changes.note = (c.note ? c.note + ' / ' : '') + `[${today}] (단계 되돌림) ${note}`;
  }
  
  saveOverride(company, changes);
  closeModal();
  toast(`✓ ${company} → ${STAGE_NAMES[targetStage].label} 이동 완료`);
  rerenderCurrent();
}

  const isSent = step === 'qSent';
  const fieldDate = isSent ? 'qSent' : 'qReply';
  const fieldLabel = isSent ? 'qSentLabel' : 'qReplyLabel';
  const fieldDone = isSent ? 'qSentDone' : 'qReplyDone';
  const stepLabel = isSent ? '질문서 발송' : '질문서 회신';
  const icon = isSent ? '📧' : '✉️';
  
  // 이미 완료된 항목이면 취소(되돌리기) 옵션 제공

    const html = `

        <div class="form-label">${icon} ${stepLabel}일</div>
        <input type="date" class="form-input" id="qsDate" value="${c[fieldDate] || ''}" />
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn accent" onclick="undoQuestionStep('${esc(company).replace(/'/g, "\\'")}', '${step}')">↩️ 완료 취소</button>
        <button class="btn primary" onclick="confirmQuestionStep('${esc(company).replace(/'/g, "\\'")}', '${step}')">✓ 날짜 수정</button>
      </div>
    `;
    openModal(`${icon} ${stepLabel} 수정: ${company}`, html);
    return;
  }
  
  const today = new Date().toISOString().slice(0, 10);
  const html = `
    <div class="form-banner">
      <strong>${esc(company)}</strong>의 ${stepLabel}을 처리합니다.
    </div>
    <div class="form-row">
      <div class="form-label">${icon} ${stepLabel}일 <span class="req">*</span></div>
      <input type="date" class="form-input" id="qsDate" value="${today}" />
    </div>
    <div class="form-row">
      <div class="form-label">📌 비고</div>
      <textarea class="form-input form-textarea" id="qsNote" placeholder="${stepLabel} 메모 (선택)"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="confirmQuestionStep('${esc(company).replace(/'/g, "\\'")}', '${step}')">✓ ${stepLabel} 완료</button>
    </div>
  `;
  openModal(`${icon} ${stepLabel}: ${company}`, html);
}

function confirmQuestionStep(company, step) {
  const date = document.getElementById('qsDate').value;
  const noteEl = document.getElementById('qsNote');
  const note = noteEl ? noteEl.value.trim() : '';
  if (!date) { alert('날짜를 입력하세요'); return; }
  
  const isSent = step === 'qSent';
  const fieldDate = isSent ? 'qSent' : 'qReply';
  const fieldLabel = isSent ? 'qSentLabel' : 'qReplyLabel';
  const fieldDone = isSent ? 'qSentDone' : 'qReplyDone';
  const stepLabel = isSent ? '질문서 발송' : '질문서 회신';
  
  const lbl = date.slice(2).replace(/-/g, '.');
  const c = DATA.newMou.find(x => x.company === company);
  const changes = {
    [fieldDate]: date, [fieldLabel]: lbl, [fieldDone]: true,
  };
  if (note) {
    const today = new Date().toISOString().slice(2, 10).replace(/-/g, '.');
    changes.note = (c.note ? c.note + ' / ' : '') + `[${today}] (${stepLabel} ${lbl}) ${note}`;
  }
  
  saveOverride(company, changes);
  closeModal();
  toast(`✓ ${company} ${stepLabel} 완료 (${lbl})`);
  rerenderCurrent();
}

function undoQuestionStep(company, step) {
  const isSent = step === 'qSent';
  const fieldDate = isSent ? 'qSent' : 'qReply';
  const fieldLabel = isSent ? 'qSentLabel' : 'qReplyLabel';
  const fieldDone = isSent ? 'qSentDone' : 'qReplyDone';
  const stepLabel = isSent ? '질문서 발송' : '질문서 회신';
  
  saveOverride(company, {
    [fieldDate]: null, [fieldLabel]: null, [fieldDone]: false,
  });
  closeModal();
  toast(`↩️ ${company} ${stepLabel} 취소`);
  rerenderCurrent();
}

// ============ Search & Filter ============
function matchesSearch(name) {
  if (!STATE.search) return true;
  const q = STATE.search.toLowerCase();
  return name.toLowerCase().includes(q);
}

// ============ Routing ============
function setView(name) {
  STATE.view = name;
  // sidebar
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === name);
  });
  // views
  document.querySelectorAll('.view').forEach(el => {
    el.classList.toggle('active', el.id === `view-${name}`);
  });
  // header title
  const titles = {
    dashboard: '메인 대시보드',
    newmou: '신규 MOU 진행',
    moudone: 'MOU 체결완료',
    hurdle: '허들·보류',
    grades: '협력업체 등급',
    year25: '25년 등급',
    year24: '24년 등급',
    year23: '23년 등급',
    mail: '메일 템플릿',
    checklist: 'MOU 자료 관리',
    curriculum: '통합 커리큘럼',
  };
  document.getElementById('headerTitle').textContent = titles[name] || '';
  // render
  if (name === 'dashboard') renderDashboard();
  else if (name === 'newmou') renderNewMou();
  else if (name === 'moudone') renderMouDone();
  else if (name === 'hurdle') renderHurdle();
  else if (name === 'grades') renderGrades();
  else if (name === 'partnerlist') renderPartnerList();
  else if (name === 'yearGrades') renderYearGrades();
  else if (name === 'year25') renderYear('year25', '25');
  else if (name === 'year24') renderYear('year24', '24');
  else if (name === 'year23') renderYear('year23', '23');
  else if (name === 'mail') renderMail();
  else if (name === 'checklist') renderChecklist();
  else if (name === 'curriculum') renderCurriculum();
  // save
  lsSet('lastView', name);
  // scroll to top
  document.querySelector('.main').scrollTop = 0;
}
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => setView(el.dataset.view));
});

const searchInput = document.getElementById('globalSearch');
searchInput.addEventListener('compositionstart', () => { STATE.isComposing = true; });
searchInput.addEventListener('compositionend', (e) => {

function renderDashboard() {
  const meta = DATA.meta;

  const stageDist = [0, 0, 0, 0, 0, 0];
  active.forEach(c => stageDist[getCurrentStage(c)]++);

  // 등급별 매출
  const gradeRows = ['S', 'A', 'B', 'C', 'N', 'F'].map(g => ({
    grade: g,
    count: meta.gradeCount[g],
    sales: meta.gradeSales[g],
    pct: meta.total25Sales > 0 ? meta.gradeSales[g] / meta.total25Sales : 0,
  }));

  // 도넛 차트 데이터
  const totalSales = meta.total25Sales;
  const cumulative = [];
  let acc = 0;
  gradeRows.forEach(r => {
    cumulative.push({ grade: r.grade, start: acc, end: acc + r.pct, sales: r.sales, count: r.count });
    acc += r.pct;
  });
  // SVG 도넛 path
  const cx = 90, cy = 90, rOuter = 80, rInner = 50;
  const arcPath = (start, end) => {
    const a1 = start * 2 * Math.PI - Math.PI / 2;
    const a2 = end * 2 * Math.PI - Math.PI / 2;
    const x1 = cx + rOuter * Math.cos(a1);
    const y1 = cy + rOuter * Math.sin(a1);
    const x2 = cx + rOuter * Math.cos(a2);
    const y2 = cy + rOuter * Math.sin(a2);
    const x3 = cx + rInner * Math.cos(a2);
    const y3 = cy + rInner * Math.sin(a2);
    const x4 = cx + rInner * Math.cos(a1);
    const y4 = cy + rInner * Math.sin(a1);
    const large = end - start > 0.5 ? 1 : 0;
    return `M ${x1} ${y1} A ${rOuter} ${rOuter} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rInner} ${rInner} 0 ${large} 0 ${x4} ${y4} Z`;
  };
  const gradeColors = {
