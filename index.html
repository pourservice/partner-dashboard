// ============ 인라인 편집 핸들러 ============
function inlineUpdateStageDate(input) {
  const company = input.dataset.company;
  const field = input.dataset.field;
  const labelField = input.dataset.labelfield;
  const doneField = input.dataset.donefield;
  const v = input.value;
  
  const changes = {};
  if (v) {
    changes[field] = v;
    changes[labelField] = v.slice(2).replace(/-/g, '.');
    if (doneField) changes[doneField] = true;
  } else {
    changes[field] = null;
    changes[labelField] = null;
    if (doneField) changes[doneField] = false;
  }
  saveOverride(company, changes);
  miniToast('✓ 저장됨');
  // 진행률 바만 업데이트
  updateProgressBar(company);
}

function inlineUpdateField(input) {
  const company = input.dataset.company;
  const field = input.dataset.field;
  saveOverride(company, { [field]: input.value.trim() || null });
  miniToast('✓ 저장됨');
}

function inlineUpdateBool(input) {
  const company = input.dataset.company;
  const field = input.dataset.field;
  saveOverride(company, { [field]: input.checked });
  // 라벨 텍스트 업데이트
  const span = input.parentElement.querySelector('span');
  if (span) span.textContent = input.checked ? '✓ 완료' : '대기';
  miniToast('✓ 저장됨');
  updateProgressBar(company);
}

// 단계 생략 토글
function inlineUpdateSkip(input) {
  const company = input.dataset.company;
  const skipField = input.dataset.field;
  const dateField = input.dataset.datefield;
  const labelField = input.dataset.labelfield;
  const doneField = input.dataset.donefield;
  const isSkipped = input.checked;
  
  const changes = {};
  changes[skipField] = isSkipped;
  if (isSkipped) {
    // 생략 시 날짜·완료 상태 초기화
    if (dateField) changes[dateField] = null;
    if (labelField) changes[labelField] = null;
    if (doneField) changes[doneField] = false;
  }
  saveOverride(company, changes);
  miniToast(isSkipped ? '⊘ 생략 처리됨' : '✓ 생략 해제');
  updateProgressBar(company);
  
  // UI 즉시 반영 - 행 자체 클래스 토글, 입력 disabled
  const row = input.closest('.detail-stage-row');
  if (row) {
    row.classList.toggle('skipped', isSkipped);
    const dateInput = row.querySelector('.detail-date-input');
    if (dateInput) {
      dateInput.disabled = isSkipped;
      if (isSkipped) dateInput.value = '';
    }
    const doneToggle = row.querySelector('.detail-done-toggle');
    if (doneToggle) {
      doneToggle.classList.toggle('disabled', isSkipped);
      const checkInput = doneToggle.querySelector('input[type=checkbox]');
      if (checkInput) {
        checkInput.disabled = isSkipped;
        if (isSkipped) checkInput.checked = false;
        const lbl = doneToggle.querySelector('span');
        if (lbl) lbl.textContent = checkInput.checked ? '✓ 완료' : '대기';
      }
    }
    const skipLabel = input.parentElement.querySelector('span');
    if (skipLabel) skipLabel.textContent = isSkipped ? '⊘ 생략됨' : '⊘ 생략';
    input.parentElement.classList.toggle('active', isSkipped);
  }
}

function inlineUpdateDoc(input) {
  const company = input.dataset.company;
  const docKey = input.dataset.doc;
  const docs = lsGet('companyDocs_' + company, {});
  if (input.checked) docs[docKey] = true;
  else delete docs[docKey];
  lsSet('companyDocs_' + company, docs);
  
  // 라벨 visual 업데이트
  const label = input.closest('.doc-check');
  if (label) {
    label.classList.toggle('checked', input.checked);
    const mark = label.querySelector('.doc-check-mark');
    if (mark) mark.textContent = input.checked ? '✓' : '';
  }
  
  // 진행률 뱃지 업데이트
  const allDocsComplete = REQUIRED_DOCS_FINAL.every(d => docs[d.key]);
  const checkedCount = REQUIRED_DOCS_FINAL.filter(d => docs[d.key]).length;
  const badge = document.querySelector('.docs-progress-badge');
  if (badge) {
    badge.textContent = `${checkedCount} / ${REQUIRED_DOCS_FINAL.length}`;
    badge.classList.toggle('done', allDocsComplete);
  }
  
  miniToast('✓ 서류 체크 저장');
}

function inlineUpdateNote(company) {
  const v = document.getElementById('noteInline').value.trim();
  saveOverride(company, { note: v || null });
  miniToast('✓ 비고 저장됨');
}

// ============ 현장 인라인 편집 ============
function inlineAddSiteRow(company, withExample) {
  const list = document.getElementById('sitesInlineList');
  const empty = document.getElementById('emptySitesInline');
  if (empty) empty.remove();
  
  const existingRows = list.querySelectorAll('.site-inline-row').length;
  const today = new Date().toISOString().slice(2, 10).replace(/-/g, '.');
  const exampleVal = withExample ? `${today}_현장명(공종)_상태` : '';
  
  const div = document.createElement('div');
  div.className = 'site-inline-row';
  div.dataset.idx = existingRows;
  div.innerHTML = `
    <div class="site-inline-no">${existingRows + 1}</div>
    <textarea class="form-input site-inline-input" rows="2" placeholder="예: 26.04.30_현장명(공종)_상태"
              onchange="inlineSaveSites('${company}')">${esc(exampleVal)}</textarea>
    <button class="btn sm" style="color:var(--danger);align-self:flex-start;font-size:10px;padding:4px 6px" onclick="inlineRemoveSite(this, '${company}')">🗑️</button>
  `;
  list.appendChild(div);
  div.querySelector('textarea').focus();
  if (withExample) inlineSaveSites(company);
}

function inlineRemoveSite(btn, company) {
  const row = btn.closest('.site-inline-row');
  if (!row) return;
  row.remove();
  // 번호 재정렬
  document.querySelectorAll('#sitesInlineList .site-inline-row').forEach((r, i) => {
    r.querySelector('.site-inline-no').textContent = (i + 1);
    r.dataset.idx = i;
  });
  inlineSaveSites(company);
  
  if (document.querySelectorAll('#sitesInlineList .site-inline-row').length === 0) {
    document.getElementById('sitesInlineList').innerHTML = '<div class="text-lt fs-11" id="emptySitesInline" style="padding:14px;text-align:center;background:var(--bg);border-radius:6px">등록된 현장이 없습니다 — 아래 [+ 현장 추가]로 입력하세요.</div>';
  }
}

function inlineSaveSites(company) {
  const inputs = document.querySelectorAll('#sitesInlineList .site-inline-input');
  const sites = Array.from(inputs).map(i => i.value.trim()).filter(s => s);
  const siteText = sites.join('\n');
  saveOverride(company, { site: siteText || null });
  
  // 카운트 업데이트
  const cnt = document.getElementById('siteCount');
  if (cnt) cnt.textContent = sites.length;
  
  miniToast(`📍 현장 ${sites.length}건 저장`);
}

// 진행률 바 업데이트
function updateProgressBar(company) {
  const c = DATA.newMou.find(x => x.company === company);
  if (!c) return;
  const stageNum = recalcStage(c);
  c.stage = stageNum;
  const bars = document.querySelectorAll('.progress-bar .progress-bar-step');
  bars.forEach((bar, i) => {
    const s = i + 1;
    bar.classList.toggle('done', stageNum >= s);
  });
}

// 작은 토스트 (인라인 저장 알림용)
function miniToast(msg) {
  let t = document.getElementById('miniToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'miniToast';
    t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--success);color:#fff;padding:8px 14px;border-radius:6px;font-size:11px;font-weight:600;z-index:10000;opacity:0;transition:opacity 0.2s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 1500);
}

// ============ Render: 신규 MOU 진행 ============
// 칸반/리스트에서 제외할 항목 (등급 표시, 헤더 행 등 데이터 오류)
const NEWMOU_EXCLUDE = new Set([
  'S', 'A', 'B', 'C', 'D', 'N', 'F', '9',
  'S등급', 'A등급', 'B등급', 'C등급', 'D등급', 'N등급', 'F등급',
  '업체명', '총계', '구분', '등급', '구분(등급)', '고객군 총계', '등급설정X 및 입주자대표'
]);

function isValidMouCompany(c) {
  if (!c || !c.company) return false;
  const name = String(c.company).trim();
  if (!name) return false;
  if (NEWMOU_EXCLUDE.has(name)) return false;
  return true;
}

// DATA.newMou에서 잘못된 항목 일괄 제거 + localStorage의 newMouAdds도 정리
function cleanupInvalidMouEntries() {
  if (Array.isArray(DATA.newMou)) {
    const before = DATA.newMou.length;
    DATA.newMou = DATA.newMou.filter(isValidMouCompany);
    const removed = before - DATA.newMou.length;
    if (removed > 0) {
      console.log(`🧹 잘못된 newMou 항목 ${removed}개 제거`);
    }
  }
  // localStorage의 newMouAdds도 정리
  try {
    const adds = lsGet('newMouAdds', []);
    if (Array.isArray(adds)) {
      const cleaned = adds.filter(isValidMouCompany);
      if (cleaned.length !== adds.length) {
        lsSet('newMouAdds', cleaned);
        console.log(`🧹 newMouAdds에서 ${adds.length - cleaned.length}개 제거`);
      }
    }
  } catch (e) {}
  // mouOverrides의 잘못된 키도 정리
  try {
    const overrides = lsGet('mouOverrides', {});
    let changed = false;
    Object.keys(overrides).forEach(k => {
      if (NEWMOU_EXCLUDE.has(String(k).trim())) {
        delete overrides[k];
        changed = true;
      }
    });
    if (changed) {
      lsSet('mouOverrides', overrides);
    }
  } catch (e) {}
}

function renderNewMou() {
  const active = DATA.newMou
    .filter(isValidMouCompany)
    .filter(c => !c.hurdle && !c.mouDone)
    .filter(c => matchesSearch(c.company));
  
  const stageDist = [0, 0, 0, 0, 0];
  active.forEach(c => stageDist[getCurrentStage(c)]++);

  // 단계 필터 적용
  let filtered = active;
  if (STATE.newMouFilter !== 'all') {
    filtered = active.filter(c => getCurrentStage(c) == STATE.newMouFilter);
  }

  // 정렬: 가장 오래된 진행 단계부터
  filtered.sort((a, b) => {
    const da = getLastDate(a) || '9999';
    const db = getLastDate(b) || '9999';
    return da.localeCompare(db);
  });

  // 칸반/리스트 토글
  const filterPills = `
    <div class="filter-bar">
      <button class="filter-pill ${STATE.newMouFilter === 'all' ? 'active' : ''}" onclick="STATE.newMouFilter='all';renderNewMou()">
        전체 <span class="count">${active.length}</span>
      </button>
      ${[1,2,3,4].map(s => `
        <button class="filter-pill ${STATE.newMouFilter == s ? 'active' : ''}" onclick="STATE.newMouFilter='${s}';renderNewMou()">
          ${esc(STAGE_NAMES[s].label)} (${esc(STAGE_WAITING[s])}) <span class="count">${stageDist[s]}</span>
        </button>
      `).join('')}
      <div style="margin-left:auto;display:flex;gap:4px">
        <button class="btn ${STATE.newMouView === 'kanban' ? 'primary' : ''}" onclick="STATE.newMouView='kanban';renderNewMou()">📋 칸반</button>
        <button class="btn ${STATE.newMouView === 'list' ? 'primary' : ''}" onclick="STATE.newMouView='list';renderNewMou()">📃 리스트</button>

  let body = '';
  if (STATE.newMouView === 'kanban') {
    if (STATE.newMouFilter === 'all') {
      body = renderKanban(active);
    } else {
      body = renderFilteredGrid(filtered, STATE.newMouFilter);
    }
  } else {
    body = renderListMou(filtered);
  }

  const html = `
    <div class="view-header">
      <div>
        <div class="view-title"><span class="accent-bar"></span>신규 MOU 체결 프로세스</div>
        <div class="view-sub">미체결 진행 ${active.length}건 · ① 질문서 발송 → ② 회신 → ③ 1차 미팅 → ④ 2차 미팅 → ⑤ MOU 체결</div>
      </div>
    </div>

    <!-- 엑셀 액션 바 -->
    <div class="action-bar">
      <span class="action-bar-label">📊 데이터 관리</span>
      <button class="btn action primary" onclick="triggerImportMou()">📤 엑셀 가져오기</button>
      <button class="btn action success" onclick="exportMouExcel()">📥 엑셀 내보내기</button>
      <div class="action-bar-divider"></div>
      <button class="btn action" onclick="showAddMouModal()">+ 직접 추가</button>
      <button class="btn action" onclick="exportMouTemplate()">📋 양식 다운로드</button>
    </div>
    <div class="text-lt fs-11" style="margin:-8px 0 14px;padding:0 4px">
      💡 두번째 사진 형식의 엑셀을 업로드하면 자동 입력 · <strong>📋 양식 다운로드</strong>로 입력용 빈 엑셀(예시·가이드 포함)을 받을 수 있습니다
      <br>🟡 <strong>업체명에 노란색 음영이 있는 행만 가져옴</strong> + <strong>음영이 빠진 기존 항목은 신규 칸반에서 자동 제거</strong> (=기존업체 전환 처리)
      <br>🚧 <strong>"허들 체크" 구분자 행</strong> 아래 업체들은 자동으로 <strong>허들·보류</strong> 탭으로 분류됩니다
      <br>👻 <strong>엑셀에 더이상 없는 업체</strong>도 함께 자동 제거됩니다 (Excel = Source of Truth · 새 업체는 항상 엑셀에 먼저 추가)
    </div>

    ${filterPills}
    ${body}
  `;
  document.getElementById('view-newmou').innerHTML = html;
}

function renderFilteredGrid(filtered, stage) {
  const label = STAGE_NAMES[stage] ? STAGE_NAMES[stage].label : '';
  const waiting = STAGE_WAITING[stage] || '';
  if (filtered.length === 0) {
    return `
      <div class="filter-grid-header" style="display:flex;align-items:center;gap:10px;padding:14px 18px;margin-bottom:14px;background:var(--bg-soft);border-left:4px solid var(--stage-${stage});border-radius:8px">
        <span class="stage-mark" style="background:var(--stage-${stage});width:14px;height:14px;border-radius:4px;display:inline-block"></span>
        <strong style="font-size:14px">${stage}. ${esc(label)}</strong>
        <span style="font-size:12px;color:var(--text-lt)">→ ${esc(waiting)}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--text-lt)">0건</span>
      </div>
      <div class="empty" style="padding:40px 20px;text-align:center;color:var(--text-lt)">
        해당 단계에 업체가 없습니다.
      </div>
    `;
  }
  return `
    <div class="filter-grid-header" style="display:flex;align-items:center;gap:10px;padding:14px 18px;margin-bottom:14px;background:var(--bg-soft);border-left:4px solid var(--stage-${stage});border-radius:8px">
      <span class="stage-mark" style="background:var(--stage-${stage});width:14px;height:14px;border-radius:4px;display:inline-block"></span>
      <strong style="font-size:14px">${stage}. ${esc(label)}</strong>
      <span style="font-size:12px;color:var(--text-lt)">→ ${esc(waiting)}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--text-lt)">${filtered.length}건</span>
    </div>
    <div class="filter-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;align-items:start">
      ${filtered.map(c => renderKanbanCard(c, stage)).join('')}
    </div>
  `;
}

function renderKanban(active) {
  const cols = [0, 1, 2, 3, 4].map(s => ({
    stage: s,
    label: STAGE_NAMES[s].label,
    waiting: STAGE_WAITING[s],
    items: active.filter(c => getCurrentStage(c) === s)
                 .sort((a, b) => (getLastDate(a) || '9999').localeCompare(getLastDate(b) || '9999')),
  }));

  return `
    <div class="drag-hint">
      💡 5단계 칸반 — <span class="accent">질문서 → 1차미팅 대기 → 1차미팅 완료 → 2차미팅 대기 → 2차미팅 완료</span> ·
      회신 받으면 자동으로 [1차미팅 대기]로 이동 ·
      카드를 끌어 단계 변경 가능 ·
      <span class="accent">⚠️</span> 버튼으로 허들 이동 ·
      <span class="accent">📍</span> 클릭으로 현장 상세
    </div>
    <div class="kanban kanban-5col">
      ${cols.map(col => `
        <div class="kanban-col" data-stage="${col.stage}"
             ondragover="dragOver(event)"
             ondragleave="dragLeave(event)"
             ondrop="drop(event,${col.stage})">
          <div class="kanban-col-header">
            <div class="kanban-col-title">
              <span class="stage-mark" style="background:var(--stage-${col.stage})"></span>
              ${col.stage}. ${esc(col.label)}
            </div>
            <div class="kanban-col-count">${col.items.length}</div>
          </div>
          <div class="kanban-col-title text-lt fs-11" style="margin:-8px 4px 10px">→ ${esc(col.waiting)}</div>
          ${col.items.length === 0 ? '<div class="empty fs-11">대기 업체 없음<br><span style="font-size:10px">여기로 카드를 드롭하세요</span></div>' : 
            col.items.map(c => renderKanbanCard(c, col.stage)).join('')}
        </div>
      `).join('')}
    </div>
  `;
}

function renderKanbanCard(c, stage) {
  const lastD = getLastDate(c);
  const days = lastD ? daysSince(lastD) : null;
  const dayClass = days > 30 ? 'danger' : (days > 15 ? 'warn' : '');
  const compEsc = esc(c.company).replace(/'/g, "\\'");
  const sites = parseSites(c.site);
  
  // 진행 정보 line (단계별 의미있는 정보 표시)
  let stageLine = '';
  if (stage === 0) {
    if (c.qSentDone) stageLine = `<span>발송 ${esc(c.qSentLabel || '✓')}</span>`;
    else if (c.qSentSkipped) stageLine = `<span class="text-lt">발송 생략</span>`;
    else stageLine = `<span class="text-lt">신규 — 미발송</span>`;
  } else if (stage === 1) {
    if (c.qReplyDone) stageLine = `<span>회신 ${fmtDate(c.qReply, c.qReplyLabel)}</span>`;
    else if (c.qReplySkipped) stageLine = `<span class="text-lt">⊘ 회신 생략</span>`;
    else stageLine = `<span class="text-lt">1차 일정 조율</span>`;
  } else if (stage === 2) {
    if (c.m1Skipped) stageLine = `<span class="text-lt">⊘ 1차미팅 생략</span>`;
    else stageLine = `<span>1차 ${fmtDate(c.m1, c.m1Label)}</span>`;
  } else if (stage === 3) {
    stageLine = `<span>1차 ${c.m1Skipped ? '생략' : (fmtDate(c.m1, c.m1Label) + ' 완료')}</span>`;
  } else if (stage === 4) {
    if (c.m2Skipped) stageLine = `<span class="text-lt">⊘ 2차미팅 생략</span>`;
    else stageLine = `<span>2차 ${fmtDate(c.m2, c.m2Label)}</span>`;
  }

  // 카드별 액션 버튼 (각 단계에 맞는 것만)
  let actions = '';
  if (stage === 0) {
    actions = `
      <button class="kanban-card-action ${c.qSentDone ? '' : 'primary'}" onclick="markQuestionStep('${compEsc}', 'qSent', event)">
        📧 ${c.qSentDone ? '발송 ' + esc(c.qSentLabel || '✓') : '질문서 발송'}
      </button>
      <button class="kanban-card-action ${c.qReplyDone ? 'success' : (c.qSentDone ? 'primary' : '')}" onclick="markQuestionStep('${compEsc}', 'qReply', event)">
        ✉️ ${c.qReplyDone ? '회신 ' + esc(c.qReplyLabel || '✓') : '회신 처리'}
      </button>
    `;
  } else if (stage === 1) {
    actions = `
      <button class="kanban-card-action ${c.m1Scheduled ? '' : 'primary'}" onclick="scheduleMeeting1('${compEsc}', event)">
        🤝 ${c.m1Scheduled ? '일정 수정' : '1차 일정 잡기'}
      </button>
      <button class="kanban-card-action success" onclick="moveToStage('${compEsc}', 2, event)">
        ✓ 1차미팅 완료
      </button>
    `;
  } else if (stage === 2) {
    actions = `
      <button class="kanban-card-action primary" onclick="scheduleMeeting2('${compEsc}', event)">
        🎓 2차 일정 잡기
      </button>
    `;
  } else if (stage === 3) {
    actions = `
      <button class="kanban-card-action" onclick="scheduleMeeting2('${compEsc}', event)">
        📝 일정 수정
      </button>
      <button class="kanban-card-action success" onclick="moveToStage('${compEsc}', 4, event)">
        ✓ 2차미팅 완료
      </button>
    `;
  } else if (stage === 4) {
    actions = `
      <button class="kanban-card-action accent" onclick="completeMou('${compEsc}', event)">
        ✅ MOU 체결 완료
      </button>
    `;
  }

  return `
    <div class="kanban-card s${stage} ${days > 30 ? 'danger' : days > 15 ? 'warning' : ''}"
         draggable="true"
         ondragstart="dragStart(event,'${compEsc}')"
         ondragend="dragEnd(event)"
         onclick="showDetail('${compEsc}')">
      <div class="kanban-card-name-row">
        <div class="kanban-card-name">
          ${esc(c.company)}
          ${c._modified ? '<span class="modified-pill">수정</span>' : ''}
          ${c._added ? '<span class="added-pill">신규</span>' : ''}
        </div>
        <button class="kanban-card-hurdle-btn" onclick="moveToHurdle('${compEsc}', event)" title="허들·보류로 이동">⚠️</button>
      </div>
      
      <div class="kanban-card-meta">
        ${stageLine}
        ${days != null ? `<span class="kanban-card-days ${dayClass}">${days}일</span>` : ''}
      </div>

      ${stage >= 1 && c.m1Scheduled && !c.m1Done ? `
        <div class="kanban-card-info schedule">
          🤝 <strong>1차미팅 예정</strong> ${esc(c.m1ScheduledLabel || c.m1Scheduled)}
          ${c.m1Owner ? ` · 👤 ${esc(c.m1Owner)}` : ''}
        </div>
      ` : ''}
      ${stage >= 2 && c.m1Done ? `
        <div class="kanban-card-info done">
          🤝 1차미팅 완료 ${fmtDate(c.m1, c.m1Label)}
          ${c.m1Owner ? ` · 👤 ${esc(c.m1Owner)}` : ''}
        </div>
      ` : ''}
      ${stage === 3 && c.m2Scheduled && !c.m2Done ? `
        <div class="kanban-card-info schedule">
          🎓 <strong>2차미팅 예정</strong> ${esc(c.m2ScheduledLabel || c.m2Scheduled)}
          ${c.m2Owner ? ` · 👤 ${esc(c.m2Owner)}` : ''}
        </div>
      ` : ''}
      ${stage === 4 && c.m2Done ? `
        <div class="kanban-card-info done">
          🎓 2차미팅 완료 ${fmtDate(c.m2, c.m2Label)}
          ${c.m2Owner ? ` · 👤 ${esc(c.m2Owner)}` : ''}
        </div>
      ` : ''}

      ${sites.length > 0 ? `
        <div class="kanban-card-site" onclick="event.stopPropagation();showDetail('${compEsc}')" title="클릭하여 전체 현장 보기">
          📍 ${esc(sites[0].slice(0, 28))}${sites[0].length > 28 ? '…' : ''}
          ${sites.length > 1 ? `<span class="site-count">+${sites.length - 1}</span>` : ''}
        </div>
      ` : ''}

      ${c.note ? `<div class="kanban-card-meta text-xlt">📌 ${esc(c.note).slice(0, 50)}${c.note.length > 50 ? '…' : ''}</div>` : ''}

      ${(() => {
        // 서류 체크리스트 미니 진행률 (단계 1 이상에서 표시)
        if (stage < 1) return '';
        const docs = lsGet('companyDocs_' + c.company, {});
        const totalDocs = (typeof REQUIRED_DOCS_FINAL !== 'undefined') ? REQUIRED_DOCS_FINAL.length : 0;
        if (totalDocs === 0) return '';
        const checkedDocs = (typeof REQUIRED_DOCS_FINAL !== 'undefined') ? REQUIRED_DOCS_FINAL.filter(d => docs[d.key]).length : 0;
        if (checkedDocs === 0 && stage < 3) return '';  // 2차 이전에는 0이면 숨김
        const allDone = checkedDocs === totalDocs;
        const cls = allDone ? 'done' : (checkedDocs >= totalDocs / 2 ? 'half' : 'start');
        return `<div class="kanban-card-docs ${cls}" title="받아야 할 서류: ${checkedDocs}/${totalDocs}">📋 서류 ${checkedDocs}/${totalDocs}${allDone ? ' ✓' : ''}</div>`;
      })()}

      <div class="kanban-card-actions">
        ${actions}
      </div>
    </div>
  `;
}

                  <td class="num">${days != null ? `<span class="kanban-card-days ${days > 30 ? 'danger' : days > 15 ? 'warn' : ''}">${days}일</span>` : '—'}</td>
                  <td class="fs-11 text-md text-truncate" style="max-width:200px">${esc((c.site || '').slice(0, 60))}${c.note ? ` · 📌 ${esc(c.note)}` : ''}</td>
                  <td class="fs-11 text-accent fw-600">${action}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderMouDone() {

    .filter(c => !c.hurdle && c.mouDone)
    .filter(c => matchesSearch(c.company));

  const sorted = [...all].sort((a, b) => {
    if (STATE.mouDoneSort === 'name') return a.company.localeCompare(b.company);
    const da = a.mou || '0000';

    return STATE.mouDoneSort === 'mouAsc' ? da.localeCompare(db) : db.localeCompare(da);

  // 연도별 그룹

function saveHurdleAction(sel) {
  const company = sel.dataset.company;
  const value = sel.value;
  const actions = lsGet('hurdleActions', {});
  if (value) actions[company] = value;
  else delete actions[company];
  lsSet('hurdleActions', actions);
  toast(`${company} 액션 저장됨: ${value || '미설정'}`);
}

const GRADE_CRITERIA_ORDER = ['S', 'A', 'B', 'C', 'N', 'F', 'D'];

function renderGradeCriteria() {
  const collapsed = lsGet('gradeCriteriaCollapsed', false);
  // DATA.gradeDefs 우선, 없으면 GRADE_DEF fallback
  const defs = (DATA.gradeDefs || {});
  
  const cells = GRADE_CRITERIA_ORDER.map(g => {
    const meta = GRADE_DEF[g];
    const def = defs[g] || {};
    const activity = def.activity || meta.desc || '';
    const desc = def.descLong || meta.name || '';
    return `
      <div class="grade-criteria-cell ${meta.class}">
        <div class="grade-criteria-row1">
          <span class="grade-criteria-letter ${meta.class}">${g}</span>
          <span class="grade-criteria-name">${esc(meta.name)}</span>
        </div>
        <div class="grade-criteria-activity">${esc(activity)}</div>
        <div class="grade-criteria-desc">${esc(desc)}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="grade-criteria">
      <div class="grade-criteria-header">
        <div class="grade-criteria-title">
          <span class="grade-criteria-title-bar"></span>
          📌 등급 기준 안내
        </div>
        <span class="text-lt fs-11" style="font-weight:500">25년 매출 / 사용 빈도 / 협약 유지 상태에 따라 분류</span>
        <span class="grade-criteria-toggle" onclick="toggleGradeCriteria()">${collapsed ? '▼ 펼치기' : '▲ 접기'}</span>
      </div>
      <div class="grade-criteria-grid ${collapsed ? 'collapsed' : ''}">
        ${cells}
      </div>
    </div>
  `;
}

function toggleGradeCriteria() {
  const collapsed = lsGet('gradeCriteriaCollapsed', false);
  lsSet('gradeCriteriaCollapsed', !collapsed);
  renderGrades();
}

function renderGrades() {
  const grades = ['S', 'A', 'B', 'C', 'N', 'F'];
  const meta = DATA.meta;

  // STATE 기본값
  if (!STATE.gradesViewMode) STATE.gradesViewMode = 'all';  // 'all' or single grade letter
  if (!STATE.gradesYear) STATE.gradesYear = 'y25';  // 정렬 기준 연도

  // 모든 업체 1차 합집합
  const allCompanies = [];
  grades.forEach(g => {
    DATA.grades[g].forEach(c => {
      // 중복 방지 (이름 기준)
      if (!allCompanies.find(x => x.name === c.name)) {
        allCompanies.push(c);
      }
    });
  });

  // 검색 적용
  let filtered = allCompanies.filter(c => matchesSearch(c.name));
  
  // 등급 필터
  if (STATE.gradesViewMode !== 'all') {
    filtered = filtered.filter(c => c.y25 && c.y25[0] === STATE.gradesViewMode);
  }
  
  // 정렬
  if (STATE.gradesSort === 'salesDesc') filtered.sort((a, b) => (b.sales || 0) - (a.sales || 0));
  else if (STATE.gradesSort === 'salesAsc') filtered.sort((a, b) => (a.sales || 0) - (b.sales || 0));
  else if (STATE.gradesSort === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
  else if (STATE.gradesSort === 'gradeDesc') {
    const order = { S: 6, A: 5, B: 4, N: 3, C: 2, F: 1 };
    const yearKey = STATE.gradesYear;
    filtered.sort((a, b) => (order[(b[yearKey] || '')[0]] || 0) - (order[(a[yearKey] || '')[0]] || 0));
  }

  const totalSales = filtered.reduce((s, c) => s + (c.sales || 0), 0);
  const maxSales = Math.max(...filtered.map(c => c.sales || 0), 1);

  const trendOrder = { S: 6, A: 5, B: 4, N: 3, C: 2, F: 1, D: 0 };
  const getTrend = (cur, prev) => {
    if (!cur || !prev) return cur && !prev ? 'new' : 'flat';
    const co = trendOrder[cur[0]] || 0;
    const po = trendOrder[prev[0]] || 0;
    if (co > po) return 'up';
    if (co < po) return 'down';
    return 'flat';
  };
  
  const renderGradeBadge = (val, year) => {
    if (!val) return `<span class="text-xlt">—</span>`;
    return `<span class="badge grade-${val[0].toLowerCase()}">${esc(val)}</span>`;
  };

  const html = `
    <div class="view-header">
      <div>
        <div class="view-title"><span class="accent-bar"></span>협력업체 등급 현황</div>
        <div class="view-sub">전체 ${allCompanies.length}개사 · 25년 매출 ${fmt(meta.total25Sales)}원 · ${STATE.gradesViewMode === 'all' ? '전체 등급 통합 보기' : `${STATE.gradesViewMode}등급 ${filtered.length}개사`}</div>
      </div>
    </div>

    ${renderGradeCriteria()}

    <!-- 엑셀 액션 바 -->
    <div class="action-bar">
      <span class="action-bar-label">📊 데이터 관리</span>
      <button class="btn action primary" onclick="triggerImportGrade()">📤 엑셀 가져오기</button>
      <button class="btn action success" onclick="exportGradeExcel()">📥 엑셀 내보내기</button>
      <div class="action-bar-divider"></div>
      <button class="btn action" onclick="showAddGradeModal()">+ 직접 추가</button>
      <button class="btn action" onclick="exportGradeTemplate()">📋 양식 다운로드</button>
    </div>
    <div class="text-lt fs-11" style="margin:-8px 0 14px;padding:0 4px">
      💡 행을 클릭하면 등급/매출/연도별 등급을 직접 수정할 수 있습니다 · 26년 등급은 빈 칸으로 시작 → 평가 후 입력
    </div>

    <!-- 등급 정의 그리드 (필터로 작동) -->
    <div class="kpi-grid grade-filter-grid">
      <div class="kpi-card grade-filter-all ${STATE.gradesViewMode === 'all' ? 'active' : ''}" onclick="STATE.gradesViewMode='all';renderGrades()">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px">📊</span>
          <span class="fw-700 fs-12">전체</span>
        </div>
        <div class="kpi-value tabular" style="font-size:22px">${allCompanies.length}<span class="kpi-unit">개</span></div>
        <div class="kpi-sub tabular">매출 ${fmtKR(meta.total25Sales)}원</div>
      </div>
      ${grades.map(g => {
        const def = GRADE_DEF[g];
        const cnt = meta.gradeCount[g];
        const sales = meta.gradeSales[g];
        const isSelected = STATE.gradesViewMode === g;
        return `
          <div class="kpi-card grade-filter-grade ${isSelected ? 'active' : ''}" onclick="STATE.gradesViewMode='${g}';renderGrades()">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span class="badge grade-${def.class} lg">${g}</span>
              <span class="fw-700 fs-12">${esc(def.name)}</span>
            </div>
            <div class="kpi-value tabular" style="font-size:22px">${cnt}<span class="kpi-unit">개</span></div>
            <div class="kpi-sub tabular">매출 ${fmtKR(sales)}원</div>
          </div>
        `;
      }).join('')}
    </div>

    <!-- 리스트 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">
          ${STATE.gradesViewMode === 'all' ? `<span class="section-title-bar"></span>📋 전체 등급 통합 리스트` : `<span class="section-title-bar" style="background:var(--grade-${GRADE_DEF[STATE.gradesViewMode].class})"></span><span class="badge grade-${GRADE_DEF[STATE.gradesViewMode].class} lg">${STATE.gradesViewMode}</span>${esc(GRADE_DEF[STATE.gradesViewMode].name)}`}
          — ${filtered.length}개사
        </div>
        <div class="section-sub">${STATE.gradesViewMode === 'all' ? '모든 등급 업체를 한눈에 — 행 클릭하여 등급/매출 수정' : esc(GRADE_DEF[STATE.gradesViewMode].desc)}</div>
      </div>

      <div class="filter-bar">
        <div class="filter-pill ${STATE.gradesSort === 'salesDesc' ? 'active' : ''}" onclick="STATE.gradesSort='salesDesc';renderGrades()">매출 높은순</div>
        <div class="filter-pill ${STATE.gradesSort === 'salesAsc' ? 'active' : ''}" onclick="STATE.gradesSort='salesAsc';renderGrades()">매출 낮은순</div>
        <div class="filter-pill ${STATE.gradesSort === 'gradeDesc' ? 'active' : ''}" onclick="STATE.gradesSort='gradeDesc';renderGrades()">등급 높은순</div>
        <div class="filter-pill ${STATE.gradesSort === 'name' ? 'active' : ''}" onclick="STATE.gradesSort='name';renderGrades()">가나다순</div>
        <div style="margin-left:auto;font-size:11px;color:var(--text-lt)">
          매출 합계 <strong style="color:var(--text-md)">${fmt(totalSales)}원</strong>
        </div>
      </div>

      <div class="scroll-x">
        <table class="table grade-table">
          <thead>
            <tr>
              <th class="row-no">#</th>
              <th>업체명</th>
              <th class="num">25년 매출</th>
              <th class="center" style="background:var(--accent-lt);color:var(--accent-deep);font-weight:800">26년<br/><span style="font-size:9px;font-weight:600">평가중</span></th>
              <th class="center">25년</th>
              <th class="center">24년</th>
              <th class="center">23년</th>
              <th class="center">22년</th>
              <th class="center">변동</th>
              <th class="center" style="width:80px">관리</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map((c, i) => {
              const trend = getTrend(c.y25, c.y24);
              const trendText = {
                up: `▲ ${c.y24 || ''}→${c.y25}`,
                down: `▼ ${c.y24 || ''}→${c.y25}`,
                flat: '─ 유지',
                new: '🆕 신규',
              }[trend];
              const barWidth = ((c.sales || 0) / maxSales) * 100;
              const compEsc = esc(c.name).replace(/'/g, "\\'");
              return `
                <tr style="cursor:pointer" onclick="showGradeEditModal('${compEsc}')">
                  <td class="row-no">${i + 1}</td>
                  <td class="company">${esc(c.name)}${c._modified ? '<span class="modified-pill">수정</span>' : ''}${c._added ? '<span class="added-pill">신규</span>' : ''}${c._fromMou ? '<span class="added-pill" style="background:var(--accent);color:#fff">MOU체결</span>' : ''}</td>
                  <td class="num bar-cell">
                    <div class="bar-fill" style="right:${100 - barWidth}%"></div>
                    <span class="bar-text">${fmt(c.sales || 0)}</span>
                  </td>
                  <td class="center" style="background:var(--accent-lt)">${c.y26 ? `<span class="badge grade-${c.y26[0].toLowerCase()}">${esc(c.y26)}</span>` : '<span class="text-xlt" style="font-size:14px">+</span>'}</td>
                  <td class="center">${renderGradeBadge(c.y25)}</td>
                  <td class="center">${renderGradeBadge(c.y24)}</td>
                  <td class="center">${renderGradeBadge(c.y23)}</td>
                  <td class="center">${renderGradeBadge(c.y22)}</td>
                  <td class="center"><span class="trend ${trend}">${trendText}</span></td>
                  <td class="center" onclick="event.stopPropagation()">
                    <button class="btn sm" style="padding:3px 8px;font-size:10px" onclick="showGradeEditModal('${compEsc}')">✏️ 수정</button>
                  </td>
                </tr>
              `;
            }).join('')}
            ${filtered.length === 0 ? `<tr><td colspan="10" class="empty"><div class="empty-icon">🔍</div>검색 결과가 없습니다.</td></tr>` : ''}
          </tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('view-grades').innerHTML = html;
}

function selectGradeRadio(btn, year) {
  const group = btn.parentElement;
  group.querySelectorAll('.grade-radio-btn').forEach(b => b.classList.remove('active', 'active-empty'));
  const grade = btn.dataset.grade;
  if (grade) {
    btn.classList.add('active');
  } else {
    btn.classList.add('active-empty');
  }
  document.getElementById('ge-' + year).value = grade;
}

function confirmGradeEdit(companyName, originalGrade) {
  const salesStr = document.getElementById('ge-sales').value.replace(/[^0-9]/g, '');
  const sales = parseInt(salesStr) || 0;
  const y26 = document.getElementById('ge-y26').value;
  const y25 = document.getElementById('ge-y25').value;
  const y24 = document.getElementById('ge-y24').value;
  const y23 = document.getElementById('ge-y23').value;
  const y22 = document.getElementById('ge-y22').value;
  const note = document.getElementById('ge-note').value.trim();
  
  if (!y25) { alert('25년 등급은 필수입니다'); return; }
  
  const newGrade = y25[0];
  const newData = { name: companyName, sales, y26, y25, y24, y23, y22 };
  if (note) newData.note = note;
  
  // 1. 기존 등급에서 제거 (originalGrade에서)
  const grades = ['S', 'A', 'B', 'C', 'N', 'F'];
  let movedFrom = null;
  grades.forEach(g => {
    const idx = DATA.grades[g].findIndex(c => c.name === companyName);
    if (idx >= 0) {
      DATA.grades[g].splice(idx, 1);
      movedFrom = g;
    }
  });
  
  // 2. 새 등급에 추가
  if (DATA.grades[newGrade]) {
    DATA.grades[newGrade].push({ ...newData, _modified: true });
  } else {
    DATA.grades[newGrade] = [{ ...newData, _modified: true }];
  }
  
  // 3. localStorage에 override 저장
  const overrides = lsGet('gradeOverrides', {});
  overrides[companyName] = newData;
  lsSet('gradeOverrides', overrides);
  
  // 4. meta 재계산
  recalcGradeMeta();
  
  closeModal();
  toast(`✓ ${companyName} 저장 (${movedFrom && movedFrom !== newGrade ? movedFrom + '→' + newGrade + ' 이동' : newGrade + '등급'})`);
  rerenderCurrent();
}

// 등급 meta 재계산
function recalcGradeMeta() {
  const meta = DATA.meta;
  ['S', 'A', 'B', 'C', 'N', 'F'].forEach(g => {
    meta.gradeCount[g] = DATA.grades[g].length;
    meta.gradeSales[g] = DATA.grades[g].reduce((s, c) => s + (c.sales || 0), 0);
  });
  meta.totalGradeCompanies = ['S','A','B','C','N','F'].reduce((s, g) => s + meta.gradeCount[g], 0);
  meta.total25Sales = ['S','A','B','C','N','F'].reduce((s, g) => s + meta.gradeSales[g], 0);
}

// ============ 엑셀 가져오기 / 내보내기 / 직접 추가 ============

// ---------- 날짜 파싱 (엑셀 → ISO 또는 라벨) ----------
function parseDateCell(v) {
  // returns { iso, label, done }
  if (v == null || v === '') return { iso: null, label: null, done: false };
  
  // Date 객체 (cellDates: true 사용 시)
  if (v instanceof Date) {
    const y = v.getFullYear();
    const m = String(v.getMonth() + 1).padStart(2, '0');
    const d = String(v.getDate()).padStart(2, '0');
    return { 
      iso: `${y}-${m}-${d}`, 
      label: `${String(y).slice(2)}.${m}.${d}`,
      done: true,
    };
  }
  
  let s = String(v).trim();
  if (!s) return { iso: null, label: null, done: false };
  
  const lower = s.toLowerCase();
  // 'X' 또는 빈값
  if (lower === 'x' || lower === '-') return { iso: null, label: s, done: false };
  
  // 'o 23.11.29' 또는 'ㅇ 23.11.29' (완료 마크)
  let isOMark = false;
  if (lower.startsWith('o ') || lower.startsWith('o.') || s.startsWith('ㅇ ') || s.startsWith('ㅇ.')) {
    isOMark = true;
  }
  
  // YY.MM.DD, YY.M.DD, YY.M/DD 등
  const dotMatch = s.match(/(\d{2,4})[.\/](\d{1,2})[.\/](\d{1,2})/);
  if (dotMatch) {
    let yy = parseInt(dotMatch[1], 10);
    const mm = parseInt(dotMatch[2], 10);
    const dd = parseInt(dotMatch[3], 10);
    if (yy < 100) yy = 2000 + yy;
    if (mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) {
      const iso = `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      return { iso, label: s, done: true };
    }
  }
  
  // YYYY-MM-DD
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) {
    return { iso: s.slice(0, 10), label: `${s.slice(2, 4)}.${s.slice(5, 7)}.${s.slice(8, 10)}`, done: true };
  }
  
  // 'o ...' 같은 마크만 있고 날짜 인식 실패
  if (isOMark) return { iso: null, label: s, done: true };
  
  // 그 외 텍스트 (숫자 포함된 거라도 인식 실패) → 라벨만 보존
  return { iso: null, label: s, done: false };
}

// ---------- 등급 정규화 ----------
function normalizeGrade(v) {
  if (v == null || v === '') return null;
  const s = String(v).trim().toUpperCase();
  if (!s) return null;
  // 'F(B)', 'N(C)' 같은 경우 그대로 보존하되, 첫 글자가 분류 기준
  return s;
}

// ---------- 매출 정규화 ----------
function normalizeSales(v) {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') return Math.round(v);
  // 콤마 제거 후 숫자 변환
  const s = String(v).replace(/[^\d.-]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : Math.round(n);
}

// ============ 등급 엑셀 가져오기 ============
function triggerImportGrade() {
  document.getElementById('fileInputGrade').click();
}

function handleImportGrade(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      // 첫 번째 시트 사용 (또는 명시적 시트)
      const sheetName = wb.SheetNames[0];
      const sheet = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
      
      if (rows.length === 0) {
        alert('엑셀 파일에 데이터가 없습니다.');
        return;
      }

      // 헤더 매핑 - 엑셀 컬럼명 → 데이터 필드
      const result = importGradeRows(rows);
      showImportResult('grade', result);
    } catch (err) {
      console.error(err);
      alert('엑셀 파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function importGradeRows(rows) {
  // 한글 헤더를 다양하게 매핑
  const headerKeys = Object.keys(rows[0]);
  // 가능한 헤더명 매칭
  const findKey = (...patterns) => {
    for (const k of headerKeys) {
      const ks = k.toString().trim();
      for (const p of patterns) {
        if (ks === p || ks.includes(p)) return k;
      }
    }
    return null;
  };
  const kName = findKey('업체명', '거래처', '회사명', '업체');
  const kSales = findKey('25년 매출', '매출', '25 매출');
  const k25 = findKey('25년', '25');
  const k24 = findKey('24년', '24');
  const k23 = findKey('23년', '23');
  const k22 = findKey('22년', '22');
  const kNote = findKey('비고', '메모', '특이사항');
  
  if (!kName) {
    return { error: '업체명 컬럼을 찾을 수 없습니다. 첫 컬럼을 "업체명"으로 지정해주세요.' };
  }

  const updated = [];
  const added = [];
  const skipped = [];

  // 등급 데이터를 평탄화 (모든 등급의 모든 업체)
  const allCompaniesMap = {};
  for (const g of Object.keys(DATA.grades)) {
    DATA.grades[g].forEach(c => {
      allCompaniesMap[c.name.trim()] = { grade: g, ref: c };
    });
  }
  
  // gradeOverrides 로드
  const gradeOverrides = lsGet('gradeOverrides', {});
  const gradeAdds = lsGet('gradeAdds', []);

  rows.forEach(row => {
    const name = (row[kName] || '').toString().trim();
    if (!name) { skipped.push('(빈 업체명)'); return; }
    
    const sales = normalizeSales(row[kSales]);
    const y25 = k25 ? normalizeGrade(row[k25]) : null;
    const y24 = k24 ? normalizeGrade(row[k24]) : null;
    const y23 = k23 ? normalizeGrade(row[k23]) : null;
    const y22 = k22 ? normalizeGrade(row[k22]) : null;
    const note = kNote ? (row[kNote] || '').toString().trim() : '';

    // 25년 등급의 첫 글자로 분류
    const targetGrade = y25 ? y25[0] : null;
    if (!targetGrade || !DATA.grades[targetGrade]) {
      skipped.push(`${name} (25년 등급 누락 또는 알수없음: ${y25 || '없음'})`);
      return;
    }

    const data = { name, sales, y25, y24, y23, y22, note: note || null, _newGrade: targetGrade };
    
    // 기존 업체와 매칭
    const existing = allCompaniesMap[name];
    if (existing) {
      // override
      gradeOverrides[name] = data;
      // 메모리 업데이트
      // 기존 등급에서 제거하고 새 등급에 추가 (등급이 바뀐 경우)
      if (existing.grade !== targetGrade) {
        DATA.grades[existing.grade] = DATA.grades[existing.grade].filter(c => c.name !== name);
        const newItem = { ...existing.ref, ...data };
        delete newItem._newGrade;
        DATA.grades[targetGrade].push(newItem);
      } else {
        Object.assign(existing.ref, data);
        delete existing.ref._newGrade;
      }
      existing.ref._modified = true;
      updated.push(name);
    } else {
      // 신규 추가
      const newItem = { name, sales, y25, y24, y23, y22, _added: true };
      DATA.grades[targetGrade].push(newItem);
      gradeAdds.push({ ...data, grade: targetGrade });
      added.push(name);
    }
  });

  lsSet('gradeOverrides', gradeOverrides);
  lsSet('gradeAdds', gradeAdds);
  recalcGradeMeta();

  return { updated, added, skipped };
}

// 셀의 배경색이 노란색인지 판별 (FFFF00 계열)
function isYellowFillCell(cell) {
  if (!cell || !cell.s) return false;
  const s = cell.s;
  // SheetJS가 색을 저장할 수 있는 여러 경로를 모두 검사
  const candidates = [
    s.fgColor && s.fgColor.rgb,
    s.bgColor && s.bgColor.rgb,
    s.fill && s.fill.fgColor && s.fill.fgColor.rgb,
    s.fill && s.fill.bgColor && s.fill.bgColor.rgb,
    s.patternFill && s.patternFill.fgColor && s.patternFill.fgColor.rgb,
  ].filter(Boolean);
  for (const c of candidates) {
    const hex = String(c).toUpperCase().replace(/^#/, '');
    // FFFF00 (노랑), FFFFFF00 (알파+노랑) 모두 매칭
    if (hex.slice(-6) === 'FFFF00') return true;
  }
  return false;
}

// 시트에서 각 행의 업체명 셀이 노란색인지 매핑 {업체명: true/false}
// 추가: "허들 체크" 행 이후의 업체들은 hurdle = true로 분류
// 반환: { hasAnyYellow: bool, yellowSet: Set<업체명>, hurdleSet: Set<업체명> }
function extractYellowMap(sheet) {
  if (!sheet || !sheet['!ref']) return { hasAnyYellow: false, yellowSet: new Set(), hurdleSet: new Set() };
  const range = XLSX.utils.decode_range(sheet['!ref']);
  const yellowSet = new Set();
  const hurdleSet = new Set();
  let hasAnyYellow = false;
  // 업체명 컬럼 위치 찾기 (헤더 행에서 '업체명' 또는 '회사명' 포함된 셀)
  let nameCol = -1;
  let headerRow = -1;
  for (let r = range.s.r; r <= Math.min(range.s.r + 5, range.e.r); r++) {
    for (let c = range.s.c; c <= range.e.c; c++) {
      const cell = sheet[XLSX.utils.encode_cell({ r, c })];
      const val = cell && cell.v ? String(cell.v).trim() : '';
      if (val === '업체명' || val === '회사명' || val === '업체') {
        nameCol = c;
        headerRow = r;
        break;
      }
    }
    if (nameCol >= 0) break;
  }
  if (nameCol < 0) {
    // 헤더 못 찾으면 첫 열 가정
    nameCol = range.s.c;
    headerRow = range.s.r;
  }
  // 헤더 다음 행부터 검사 + "허들 체크" 구분자 감지
  let inHurdleSection = false;
  for (let r = headerRow + 1; r <= range.e.r; r++) {
    const cell = sheet[XLSX.utils.encode_cell({ r, c: nameCol })];
    if (!cell || !cell.v) continue;
    const name = String(cell.v).trim();
    if (!name) continue;
    // "허들 체크" 구분자 발견 → 이후 행은 허들로 분류
    if (name === '허들 체크' || name === '허들체크' || name.includes('허들')) {
      inHurdleSection = true;
      continue;  // 구분자 자체는 가져오지 않음
    }
    if (isYellowFillCell(cell)) {
      yellowSet.add(name);
      hasAnyYellow = true;
      if (inHurdleSection) hurdleSet.add(name);
    }
  }
  return { hasAnyYellow, yellowSet, hurdleSet };
}

function handleImportMou(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true, cellStyles: true });
      const sheetName = wb.SheetNames[0];
      const sheet = wb.Sheets[sheetName];
      
      // 헤더 행 자동 탐지: "업체명"이 있는 행을 헤더로 사용
      // (1행에 제목, 2행에 실제 헤더가 있는 경우를 대응)
      let headerRowIdx = 0;
      if (sheet['!ref']) {
        const range = XLSX.utils.decode_range(sheet['!ref']);
        for (let r = range.s.r; r <= Math.min(range.s.r + 10, range.e.r); r++) {
          for (let c = range.s.c; c <= range.e.c; c++) {
            const cell = sheet[XLSX.utils.encode_cell({ r, c })];
            const val = cell && cell.v ? String(cell.v).trim() : '';
            if (val === '업체명' || val === '회사명') {
              headerRowIdx = r;
              break;
            }
          }
          if (headerRowIdx > 0) break;
        }
      }
      
      const rows = XLSX.utils.sheet_to_json(sheet, { 
        defval: '', 
        raw: false,
        range: headerRowIdx,  // 자동 탐지한 헤더 행부터 파싱
      });
      
      if (rows.length === 0) {
        alert('엑셀 파일에 데이터가 없습니다.');
        return;
      }

      // 노란색 셀 정보 추출
      const yellowMap = extractYellowMap(sheet);

      const result = importMouRows(rows, yellowMap);
      showImportResult('mou', result);
    } catch (err) {
      console.error(err);
      alert('엑셀 파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function importMouRows(rows, yellowMap) {
  const headerKeys = Object.keys(rows[0]);
  const findKey = (...patterns) => {
    for (const k of headerKeys) {
      const ks = k.toString().trim();
      for (const p of patterns) {
        if (ks === p || ks.includes(p)) return k;
      }
    }
    return null;
  };
  const kName = findKey('업체명', '회사명', '업체');
  const kQs = findKey('질문서 발송', '질문서발송', '발송');
  const kQr = findKey('질문서 회신', '질문서회신', '회신');
  const kM1Sched = findKey('1차미팅 예정', '1차 예정', '1차예정', '1차미팅예정');
  const kM1Owner = findKey('1차담당', '1차 담당', '1차미팅 담당');
  const kM1 = findKey('1차미팅', '1차 미팅', '1차');
  const kM2Sched = findKey('2차미팅 예정', '2차 예정', '2차예정', '2차미팅예정');
  const kM2Owner = findKey('2차담당', '2차 담당', '2차미팅 담당');
  const kM2 = findKey('2차미팅', '2차 미팅', '2차');
  const kMou = findKey('MOU체결', 'MOU 체결', '체결', 'MOU');
  const kSite = findKey('현장', '현장 진행', '진행');
  const kNote = findKey('기타', '비고', '메모');

  if (!kName) {
    return { error: '업체명 컬럼을 찾을 수 없습니다.' };
  }

  // 노란색 필터링 활성화 여부: 파일에 노란 음영이 1개 이상 있으면 자동 활성화
  const useYellowFilter = yellowMap && yellowMap.hasAnyYellow;
  const yellowSet = yellowMap ? yellowMap.yellowSet : new Set();
  const hurdleSet = yellowMap ? (yellowMap.hurdleSet || new Set()) : new Set();

  const updated = [];
  const added = [];
  const skipped = [];
  const skippedNonYellow = [];  // 노란색 아니어서 제외된 업체
  const hurdleApplied = [];  // 허들로 분류된 업체

  const overrides = lsGet('mouOverrides', {});

  rows.forEach(row => {
    const name = (row[kName] || '').toString().trim();
    if (!name) { skipped.push('(빈 업체명)'); return; }

    // "허들 체크" 구분자 행 자체는 건너뜀
    if (name === '허들 체크' || name === '허들체크') { return; }

    // 노란색 필터링: 노란색이 아니면 건너뜀
    if (useYellowFilter && !yellowSet.has(name)) {
      skippedNonYellow.push(name);
      return;
    }

    // 허들 여부 판정: "허들 체크" 구분자 아래 행이면 hurdle = true
    const isHurdle = hurdleSet.has(name);

    const qs = parseDateCell(kQs ? row[kQs] : null);
    const qr = parseDateCell(kQr ? row[kQr] : null);
    const m1sched = parseDateCell(kM1Sched ? row[kM1Sched] : null);
    const m1 = parseDateCell(kM1 ? row[kM1] : null);
    const m2sched = parseDateCell(kM2Sched ? row[kM2Sched] : null);
    const m2 = parseDateCell(kM2 ? row[kM2] : null);
    const mou = parseDateCell(kMou ? row[kMou] : null);
    const m1owner = kM1Owner ? ((row[kM1Owner] || '').toString().trim() || null) : null;
    const m2owner = kM2Owner ? ((row[kM2Owner] || '').toString().trim() || null) : null;
    const site = kSite ? (row[kSite] || '').toString().trim() : '';
    const note = kNote ? (row[kNote] || '').toString().trim() : '';

    const data = {
      qSent: qs.iso, qSentLabel: qs.label, qSentDone: qs.done,
      qReply: qr.iso, qReplyLabel: qr.label, qReplyDone: qr.done,
      m1Scheduled: m1sched.iso, m1ScheduledLabel: m1sched.label,
      m1Owner: m1owner,
      m1: m1.iso, m1Label: m1.label, m1Done: m1.done,
      m2Scheduled: m2sched.iso, m2ScheduledLabel: m2sched.label,
      m2Owner: m2owner,
      m2: m2.iso, m2Label: m2.label, m2Done: m2.done,
      mou: mou.iso, mouLabel: mou.label, mouDone: mou.done,
      site: site || null,
      note: note || null,
    };

    const existing = DATA.newMou.find(c => c.company === name);
    if (existing) {
      Object.assign(existing, data);
      // 허들 상태도 엑셀 기준으로 업데이트
      existing.hurdle = isHurdle;
      existing.stage = recalcStage(existing);
      existing._modified = true;
      overrides[name] = { ...data, hurdle: isHurdle };
      updated.push(name);
      if (isHurdle) hurdleApplied.push(name);
    } else {
      // 신규 추가
      const newItem = {
        company: name, hurdle: isHurdle, _added: true, _modified: true,
        ...data,
      };
      newItem.stage = recalcStage(newItem);
      DATA.newMou.push(newItem);
      // adds 별도 저장 (페이지 로드 시 복원용)
      const adds = lsGet('newMouAdds', []);
      adds.push({ ...data, company: name, hurdle: isHurdle });
      lsSet('newMouAdds', adds);
      added.push(name);
      if (isHurdle) hurdleApplied.push(name);
    }
  });

  // 노란색 필터 활성화 시: 엑셀에 있지만 노란색이 아닌 기존 항목 제거 (= 기존업체로 전환됨)
  const removedAsTransferred = [];
  if (useYellowFilter && skippedNonYellow.length > 0) {
    const transferredNames = new Set(skippedNonYellow);

    // 1) DATA.newMou에서 해당 업체 제거
    DATA.newMou = DATA.newMou.filter(c => {
      if (transferredNames.has(c.company)) {
        removedAsTransferred.push(c.company);
        return false;
      }
      return true;
    });

    // 2) localStorage의 newMouAdds에서도 제거
    try {
      const adds = lsGet('newMouAdds', []);
      const cleanedAdds = adds.filter(a => !transferredNames.has(a.company));
      if (cleanedAdds.length !== adds.length) {
        lsSet('newMouAdds', cleanedAdds);
      }
    } catch (e) {}

    // 3) mouOverrides에서도 제거
    try {
      const overridesObj = lsGet('mouOverrides', {});
      let changed = false;
      transferredNames.forEach(name => {
        if (overridesObj[name]) {
          delete overridesObj[name];
          changed = true;
        }
      });
      if (changed) lsSet('mouOverrides', overridesObj);
    } catch (e) {}
  }

  // 노란색 필터 활성화 시: 엑셀에 아예 없는 잔존 업체도 자동 제거 (Excel = Source of Truth)
  const ghostRemoved = [];
  if (useYellowFilter) {
    // 엑셀에 등장한 모든 업체명 (노란색 + 흰색 모두 포함)
    const allExcelNames = new Set([
      ...updated,    // 노란색으로 업데이트된 업체
      ...added,      // 노란색으로 신규 추가된 업체
      ...skippedNonYellow,  // 흰색이라 제외된 업체
    ]);

    // 1) DATA.newMou에서 엑셀에 없는 업체 제거
    DATA.newMou = DATA.newMou.filter(c => {
      if (!allExcelNames.has(c.company)) {
        ghostRemoved.push(c.company);
        return false;
      }
      return true;
    });

    // 2) localStorage의 newMouAdds에서도 제거
    try {
      const adds = lsGet('newMouAdds', []);
      const cleanedAdds = adds.filter(a => allExcelNames.has(a.company));
      if (cleanedAdds.length !== adds.length) {
        lsSet('newMouAdds', cleanedAdds);
      }
    } catch (e) {}

    // 3) mouOverrides에서도 제거
    try {
      const overridesObj = lsGet('mouOverrides', {});
      let changed = false;
      Object.keys(overridesObj).forEach(name => {
        if (!allExcelNames.has(name)) {
          delete overridesObj[name];
          changed = true;
        }
      });
      if (changed) lsSet('mouOverrides', overridesObj);
    } catch (e) {}
  }

  lsSet('mouOverrides', overrides);
  recalcMeta();

  return { updated, added, skipped, skippedNonYellow, useYellowFilter, hurdleApplied, removedAsTransferred, ghostRemoved };
}

// ---------- 페이지 로드 시 추가된 항목 복원 ----------
function applyAdds() {
  // 신규 MOU 추가건
  const mouAdds = lsGet('newMouAdds', []);
  mouAdds.forEach(item => {
    if (!DATA.newMou.find(c => c.company === item.company)) {
      const newItem = { ...item, _added: true, _modified: true };
      newItem.stage = recalcStage(newItem);
      DATA.newMou.push(newItem);
    }
  });
  
  // 등급 추가건
  const gradeAdds = lsGet('gradeAdds', []);
  gradeAdds.forEach(item => {
    const grade = item.grade;
    if (!grade || !DATA.grades[grade]) return;
    if (!DATA.grades[grade].find(c => c.name === item.name)) {
      const { grade: _, _newGrade, ...rest } = item;
      DATA.grades[grade].push({ ...rest, _added: true });
    }
  });
  
  // 등급 override
  const gradeOverrides = lsGet('gradeOverrides', {});
  Object.keys(gradeOverrides).forEach(name => {
    const o = gradeOverrides[name];
    // 모든 등급에서 찾기
    let found = null;
    let foundGrade = null;
    for (const g of Object.keys(DATA.grades)) {
      const item = DATA.grades[g].find(c => c.name === name);
      if (item) { found = item; foundGrade = g; break; }
    }
    if (found) {
      const target = o.y25 ? o.y25[0] : foundGrade;
      if (target !== foundGrade && DATA.grades[target]) {
        DATA.grades[foundGrade] = DATA.grades[foundGrade].filter(c => c.name !== name);
        const moved = { ...found, ...o };
        delete moved._newGrade;
        moved._modified = true;
        DATA.grades[target].push(moved);
      } else {
        Object.assign(found, o);
        delete found._newGrade;
        found._modified = true;
      }
    }
  });
  
  recalcGradeMeta();
  recalcMeta();
}

function recalcGradeMeta() {
  const meta = DATA.meta;
  meta.totalGradeCompanies = Object.values(DATA.grades).reduce((s, arr) => s + arr.length, 0);
  meta.gradeCount = {};
  meta.gradeSales = {};
  let total = 0;
  for (const g of Object.keys(DATA.grades)) {
    meta.gradeCount[g] = DATA.grades[g].length;
    meta.gradeSales[g] = DATA.grades[g].reduce((s, c) => s + c.sales, 0);
    total += meta.gradeSales[g];
  }
  meta.total25Sales = total;
  
  const e = (id) => document.getElementById(id);
  if (e('badge-grades')) e('badge-grades').textContent = meta.totalGradeCompanies;
  if (e('headerStat')) e('headerStat').textContent = meta.totalGradeCompanies;
}

function exportGradeExcel() {
  // 그림 1과 동일한 형식: 업체명 | 25년 매출 | 25년 | 24년 | 23년 | 22년 | 비고
  const allRows = [];
  GRADE_ORDER.filter(g => g !== 'D').forEach(g => {
    if (!DATA.grades[g]) return;
    DATA.grades[g].forEach(c => {
      allRows.push({
        '업체명': c.name,
        '25년 매출': c.sales || 0,
        '25년': c.y25 || '',
        '24년': c.y24 || '',
        '23년': c.y23 || '',
        '22년': c.y22 || '',
        '비고': c.note || '',
      });
    });
  });

  const ws = XLSX.utils.json_to_sheet(allRows);
  // 컬럼 너비 설정
  ws['!cols'] = [
    { wch: 24 }, { wch: 14 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 30 }
  ];
  // 매출 컬럼 숫자 포맷
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let r = 1; r <= range.e.r; r++) {
    const cell = ws[XLSX.utils.encode_cell({ r, c: 1 })];
    if (cell && typeof cell.v === 'number') {
      cell.t = 'n';
      cell.z = '#,##0';
    }
  }
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '협력업체 등급');
  
  const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  XLSX.writeFile(wb, `협력업체_등급_${today}.xlsx`);
  toast(`📥 등급 데이터 ${allRows.length}건 다운로드 완료`);
}

function confirmAddGrade() {
  const name = document.getElementById('addg-name').value.trim();
  const y25 = document.getElementById('addg-y25').value.trim().toUpperCase();
  if (!name) { alert('업체명을 입력하세요'); return; }
  if (!y25) { alert('25년 등급을 선택하세요'); return; }
  
  const sales = parseInt(document.getElementById('addg-sales').value) || 0;
  const y24 = document.getElementById('addg-y24').value.trim().toUpperCase() || null;
  const y23 = document.getElementById('addg-y23').value.trim().toUpperCase() || null;
  const y22 = document.getElementById('addg-y22').value.trim().toUpperCase() || null;
  const note = document.getElementById('addg-note').value.trim() || null;
  
  // 중복 체크
  for (const g of Object.keys(DATA.grades)) {
    if (DATA.grades[g].find(c => c.name === name)) {
      alert(`이미 존재하는 업체입니다 (${g}등급).`);
      return;
    }
  }
  
  const item = { name, sales, y25, y24, y23, y22, note, _added: true };
  DATA.grades[y25].push(item);
  
  const adds = lsGet('gradeAdds', []);
  adds.push({ name, sales, y25, y24, y23, y22, note, grade: y25 });
  lsSet('gradeAdds', adds);
  
  recalcGradeMeta();
  closeModal();
  toast(`✓ ${name} 추가됨 (${y25}등급)`);
  if (STATE.view === 'grades') {
    STATE.gradesFilter = y25;
    renderGrades();
  }
}

function confirmAddMou() {
  const name = document.getElementById('addm-name').value.trim();
  if (!name) { alert('업체명을 입력하세요'); return; }
  
  if (DATA.newMou.find(c => c.company === name)) {
    alert('이미 존재하는 업체입니다.');
    return;
  }
  
  const dateField = (id) => {
    const v = document.getElementById(id).value;
    if (!v) return { iso: null, label: null, done: false };
    return { iso: v, label: v.slice(2).replace(/-/g, '.'), done: true };
  };
  const textField = (id) => document.getElementById(id).value.trim() || null;
  
  const qs = dateField('addm-qs');
  const qr = dateField('addm-qr');
  const m1sched = dateField('addm-m1sched');
  const m1 = dateField('addm-m1');
  const m2sched = dateField('addm-m2sched');
  const m2 = dateField('addm-m2');
  const mou = dateField('addm-mou');
  const m1owner = textField('addm-m1owner');
  const m2owner = textField('addm-m2owner');
  const site = textField('addm-site');
  const note = textField('addm-note');
  const hurdle = document.getElementById('addm-hurdle').value === 'true';
  
  const item = {
    company: name,
    qSent: qs.iso, qSentLabel: qs.label, qSentDone: qs.done,
    qReply: qr.iso, qReplyLabel: qr.label, qReplyDone: qr.done,
    m1Scheduled: m1sched.iso, m1ScheduledLabel: m1sched.label,
    m1Owner: m1owner,
    m1: m1.iso, m1Label: m1.label, m1Done: m1.done,
    m2Scheduled: m2sched.iso, m2ScheduledLabel: m2sched.label,
    m2Owner: m2owner,
    m2: m2.iso, m2Label: m2.label, m2Done: m2.done,
    mou: mou.iso, mouLabel: mou.label, mouDone: mou.done,
    site, note, hurdle,
    _added: true, _modified: true,
  };
  item.stage = recalcStage(item);
  
  DATA.newMou.push(item);
  const adds = lsGet('newMouAdds', []);
  const saveItem = { ...item };
  delete saveItem._added;
  delete saveItem._modified;
  delete saveItem.stage;
  adds.push(saveItem);
  lsSet('newMouAdds', adds);
  
  recalcMeta();
  closeModal();
  toast(`✓ ${name} 추가됨 (${hurdle ? '허들' : STAGE_NAMES[item.stage].label})`);
  if (STATE.view === 'newmou' || STATE.view === 'hurdle' || STATE.view === 'moudone') {
    rerenderCurrent();
  }
}

// 협력업체 데이터 with overrides (수정/추가/삭제 반영)
function getPartnerListData(view) {
  const base = (DATA.partnerList && DATA.partnerList[view]) || [];
  const overrides = plGet(view + '_overrides', {});  // {company: {...changes}}
  const adds = plGet(view + '_adds', []);
  const deletes = plGet(view + '_deletes', []);  // [companyName, ...]
  
  let data = base.filter(c => !deletes.includes(c.company)).map(c => {
    if (overrides[c.company]) {
      return { ...c, ...overrides[c.company], _modified: true };
    }
    return c;
  });
  
  // adds: MOU 자동 추가 여부 표시 (note에 "MOU 체결로 자동 추가" 포함)
  const addedItems = adds.map(c => ({
    ...c,
    _added: true,
    _fromMou: (c.note || '').includes('MOU 체결로 자동 추가') || (c.mou && DATA.newMou && DATA.newMou.find(m => m.company === c.company && m.mouDone)),
  }));
  data = data.concat(addedItems);
  return data;
}

                  if (col.key === 'company') return `<td class="${tdCls}"><strong>${esc(v)}</strong>${c._fromMou ? '<span class="added-pill" style="background:var(--accent);color:#fff">MOU체결</span>' : c._added ? '<span class="added-pill">신규</span>' : c._modified ? '<span class="modified-pill">수정</span>' : ''}</td>`;
                  if (col.key === 'region') {
                    const regions = (v || '').split(/[,\s]+/).filter(r => r);
                    return `<td class="${tdCls}">${regions.map(r => `<span class="pl-region-pill">${esc(r)}</span>`).join(' ')}</td>`;
                  }
                  return `<td class="${tdCls}" style="font-size:11px">${esc(v)}</td>`;
                }).join('')}
                <td class="center">
                  <button class="btn sm" style="padding:3px 6px;font-size:10px" onclick="plEditCompany('${esc(c.company).replace(/'/g, "\\'")}')">✏️</button>
                  <button class="btn sm" style="padding:3px 6px;font-size:10px;color:var(--danger)" onclick="plDeleteCompany('${esc(c.company).replace(/'/g, "\\'")}')">🗑️</button>
                </td>
              </tr>
            `).join('')}
            ${filtered.length === 0 ? `<tr><td colspan="${cols.length + 1}" class="empty"><div class="empty-icon">🔍</div>조건에 맞는 업체가 없습니다.</td></tr>` : ''}
          </tbody>
        </table>
      </div>
    </div>
  `;
  
  document.getElementById('view-partnerlist').innerHTML = html;
}

// ============ 탭/필터/검색 핸들러 ============
function plSetView(view) {
  PL_STATE.view = view;
  PL_STATE.regions = [];
  PL_STATE.search = '';
  renderPartnerList();
}

function plToggleRegion(region) {
  const idx = PL_STATE.regions.indexOf(region);
  if (idx >= 0) {
    PL_STATE.regions.splice(idx, 1);
  } else {
    PL_STATE.regions.push(region);
  }
  renderPartnerList();
}

function plClearRegions() {
  PL_STATE.regions = [];
  renderPartnerList();
}

// 호환용 (기존 코드가 plSetRegion 호출하는 곳)
function plSetRegion(region) {
  if (region === '전체') plClearRegions();
  else { PL_STATE.regions = [region]; renderPartnerList(); }
}

let plSearchTimer = null;
function plSearch(q) {
  PL_STATE.search = q;
  // debounce
  clearTimeout(plSearchTimer);
  plSearchTimer = setTimeout(() => renderPartnerList(), 200);
}

function plConfirmSave(originalCompany) {
  const view = PL_STATE.view;
  const fieldsByView = {
    internal: ['company','code','ceo','bizno','address','phone','fax','email','mou','capital','note'],
    contractor: ['company','ceo','address','phone','fax'],
    external: ['company','ceo','address','phone'],
  };
  const data = {};
  fieldsByView[view].forEach(k => {
    const el = document.getElementById('pl-f-' + k);
    if (el) data[k] = el.value.trim();
  });
  
  // 지역 (다중)
  const regionChecks = document.querySelectorAll('input[name="pl-region"]:checked');
  const selectedRegions = Array.from(regionChecks).map(c => c.value);
  if (selectedRegions.length === 0) { alert('지역을 1개 이상 선택하세요'); return; }
  data.region = selectedRegions.join(', ');
  
  if (!data.company) { alert('상호는 필수입니다.'); return; }
  
  if (originalCompany) {
    // 수정
    const overrides = plGet(view + '_overrides', {});
    overrides[originalCompany] = data;
    plSet(view + '_overrides', overrides);
    
    if (originalCompany !== data.company) {
      const adds = plGet(view + '_adds', []);
      const existing = (DATA.partnerList[view] || []).find(c => c.company === originalCompany);
      if (existing) {
        const deletes = plGet(view + '_deletes', []);
        if (!deletes.includes(originalCompany)) deletes.push(originalCompany);
        plSet(view + '_deletes', deletes);
        delete overrides[originalCompany];
        plSet(view + '_overrides', overrides);
        adds.push(data);
        plSet(view + '_adds', adds);
      }
    }
    toast('✓ 업체 정보 수정됨');
  } else {
    // 추가
    const adds = plGet(view + '_adds', []);
    if (adds.find(c => c.company === data.company) || (DATA.partnerList[view] || []).find(c => c.company === data.company)) {
      alert('이미 존재하는 업체입니다.');
      return;
    }
    adds.push(data);
    plSet(view + '_adds', adds);
    
    // 내부용에서 추가 시 다른 view 동기화
    let syncedCount = 0;
    if (view === 'internal') {
      const syncContractor = document.getElementById('pl-sync-contractor')?.checked;
      const syncExternal = document.getElementById('pl-sync-external')?.checked;
      
      if (syncContractor) {
        const cAdds = plGet('contractor_adds', []);
        if (!cAdds.find(c => c.company === data.company) && !(DATA.partnerList.contractor || []).find(c => c.company === data.company)) {
          cAdds.push({
            region: data.region, company: data.company, ceo: data.ceo || '',
            address: data.address || '', phone: data.phone || '', fax: data.fax || '',
          });
          plSet('contractor_adds', cAdds);
          syncedCount++;
        }
      }
      if (syncExternal) {
        const eAdds = plGet('external_adds', []);
        if (!eAdds.find(c => c.company === data.company) && !(DATA.partnerList.external || []).find(c => c.company === data.company)) {
          eAdds.push({
            region: data.region, company: data.company, ceo: data.ceo || '',
            address: data.address || '', phone: data.phone || '',
          });
          plSet('external_adds', eAdds);
          syncedCount++;
        }
      }
    }
    
    toast(`✓ 업체 추가됨${syncedCount > 0 ? ` (${syncedCount}개 view 자동 등록)` : ''}`);
  }
  closeModal();
  renderPartnerList();
}

function plEditCompany(company) {
  const data = getPartnerListData(PL_STATE.view);
  const c = data.find(x => x.company === company);
  if (!c) return;
  plShowAddModal(c);
}

function plDeleteCompany(company) {
  if (!confirm(`정말 ${company}를 삭제하시겠습니까?\n\n현재 보기 탭(${PL_STATE.view})에서만 삭제됩니다.`)) return;
  const view = PL_STATE.view;
  
  // adds에 있으면 adds에서 제거
  const adds = plGet(view + '_adds', []);
  const newAdds = adds.filter(c => c.company !== company);
  if (newAdds.length !== adds.length) {
    plSet(view + '_adds', newAdds);
  } else {
    // base 데이터면 deletes에 추가
    const deletes = plGet(view + '_deletes', []);
    if (!deletes.includes(company)) deletes.push(company);
    plSet(view + '_deletes', deletes);
  }
  // overrides 정리
  const overrides = plGet(view + '_overrides', {});
  if (overrides[company]) {
    delete overrides[company];
    plSet(view + '_overrides', overrides);
  }
  toast(`🗑️ ${company} 삭제됨`);
  renderPartnerList();
}

// ============ 엑셀 내보내기 ============
function plExportExcel() {
  const data = getPartnerListData(PL_STATE.view);
  const filtered = PL_STATE.regions.length === 0 
    ? data 
    : data.filter(c => {
        const regions = (c.region || '').split(/[,\s]+/).filter(r => r);
        return regions.some(r => PL_STATE.regions.includes(r));
      });
  
  if (filtered.length === 0) { alert('내보낼 데이터가 없습니다'); return; }
  
  const view = PL_STATE.view;
  const columnsByView = {
    internal: ['NO','지역','상호','업체코드','대표자','사업자번호','주소','연락처','FAX','Email','협약체결','자본금','비고'],
    contractor: ['NO','지역','상호','대표자','주소','연락처','FAX'],
    external: ['NO','지역','상호','대표자','주소','연락처'],
  };
  const keysByView = {
    internal: ['no','region','company','code','ceo','bizno','address','phone','fax','email','mou','capital','note'],
    contractor: ['no','region','company','ceo','address','phone','fax'],
    external: ['no','region','company','ceo','address','phone'],
  };
  
  const cols = columnsByView[view];
  const keys = keysByView[view];
  
  const aoa = [
    ['전 국 P O U R 공 법 협 약 업 체 리 스 트'],
    cols,
    ...filtered.map((c, i) => keys.map((k, idx) => idx === 0 ? (i + 1) : (c[k] || ''))),
  ];
  
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: cols.length - 1 } }];
  ws['!cols'] = cols.map(col => {
    if (col === '주소') return { wch: 50 };
    if (col === 'NO') return { wch: 5 };
    if (col === '지역') return { wch: 7 };
    if (col === '비고') return { wch: 30 };
    if (col === 'Email') return { wch: 22 };
    return { wch: 18 };
  });
  
  const wb = XLSX.utils.book_new();
  const sheetNames = { internal: '거래업체연락처(내부)', contractor: '거래업체연락처(시공사 발송용)', external: '거래업체연락처(외부 발송용)' };
  XLSX.utils.book_append_sheet(wb, ws, sheetNames[view]);
  
  const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  const regionTag = PL_STATE.regions.length === 0 ? '전국' : PL_STATE.regions.join('+');
  const viewLabels = { internal: '내부용', contractor: '시공사발송용', external: '외부발송용' };
  XLSX.writeFile(wb, `POUR협약업체리스트_${viewLabels[view]}_${regionTag}_${today}.xlsx`);
  toast(`📥 ${filtered.length}건 엑셀 내보내기 완료`);
}

async function plExportPDFPortrait(filtered, view) {
  const viewLabels = { internal: '내부용', contractor: '시공사 발송용', external: '외부 발송용' };
  
  // 세로형이라 컬럼 축소 (가독성)
  const headersByView = {
    internal: ['NO','지역','상호','대표자','연락처','주소'],
    contractor: ['NO','지역','상호','대표자','연락처','주소'],
    external: ['NO','지역','상호','대표자','연락처','주소'],
  };
  const keysByView = {
    internal: ['no','region','company','ceo','phone','address'],
    contractor: ['no','region','company','ceo','phone','address'],
    external: ['no','region','company','ceo','phone','address'],
  };
  
  const headers = headersByView[view];
  const keys = keysByView[view];
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const todayKR = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
  const regionTag = PL_STATE.regions.length === 0 ? '전국' : PL_STATE.regions.join(', ');
  const docNo = `POUR-PL-${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`;
  
  // 세로(A4 portrait) 한 페이지에 약 28-32행 (헤더 포함)
  const ROWS_PER_PAGE = 28;
  const totalPages = Math.ceil(filtered.length / ROWS_PER_PAGE);
  
  const tempDiv = document.createElement('div');
  // A4 세로 비율 (210:297) → 화면 width 800px 기준
  tempDiv.style.cssText = 'position:fixed;left:-9999px;top:0;width:800px;background:#fff;padding:30px 30px 24px;font-family:Pretendard,sans-serif;color:#14213D;box-sizing:border-box';
  document.body.appendChild(tempDiv);
  
  toast(`📄 PDF 생성 중... (${totalPages}페이지)`);
  
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const pdfWidth = 210, pdfHeight = 297;
  
  for (let p = 0; p < totalPages; p++) {
    const start = p * ROWS_PER_PAGE;
    const end = Math.min(start + ROWS_PER_PAGE, filtered.length);
    const pageRows = filtered.slice(start, end);
    
    tempDiv.innerHTML = renderPortraitPdfPage(pageRows, p, totalPages, view, viewLabels, headers, keys, regionTag, todayKR, docNo, filtered.length, start);
    
    try {
      const canvas = await html2canvas(tempDiv, {
        scale: 2,
        backgroundColor: '#ffffff',
        logging: false,
        windowWidth: 800,
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      const imgWidth = pdfWidth - 10;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      const finalH = Math.min(imgHeight, pdfHeight - 10);
      
      if (p > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 5, 5, imgWidth, finalH);
    } catch (err) {
      console.error('PDF render error:', err);
    }
  }
  
  document.body.removeChild(tempDiv);
  
  const viewTag = { internal: '내부용', contractor: '시공사발송용', external: '외부발송용' }[view];
  const fileRegionTag = PL_STATE.regions.length === 0 ? '전국' : PL_STATE.regions.join('+');
  pdf.save(`POUR공법_협약업체리스트_${viewTag}_${fileRegionTag}_${todayStr.replace(/-/g, '')}.pdf`);
  toast(`📄 PDF ${totalPages}페이지 다운로드 완료`);
}

// 시트 이름 → view key 자동 매칭
function plDetectViewFromSheetName(sheetName) {
  const n = String(sheetName || '').replace(/\s+/g, '').toLowerCase();
  if (!n) return null;
  // 내부용
  if (n.includes('내부') || n === 'internal' || n.includes('internal')) return 'internal';
  // 시공사 발송용 (시공사가 더 구체적이므로 외부보다 먼저 체크)
  if (n.includes('시공사') || n.includes('contractor') || n.includes('시공')) return 'contractor';
  // 외부 발송용
  if (n.includes('외부') || n === 'external' || n.includes('external')) return 'external';
  return null;
}

// 시트 하나를 처리해서 결과 반환
function plProcessSheet(ws, view, keyMap) {
  const rows = XLSX.utils.sheet_to_json(ws);
  const result = { added: 0, updated: 0, skipped: 0, total: rows.length };
  if (rows.length === 0) return result;

  const adds = plGet(view + '_adds', []);
  const overrides = plGet(view + '_overrides', {});
  const baseData = (DATA.partnerList[view] || []);
  const currentAdds = [...adds];
  const currentOverrides = { ...overrides };

  rows.forEach(row => {
    const data = {};
    Object.keys(row).forEach(k => {
      const cleanK = String(k).trim();
      const mapped = keyMap[cleanK];
      if (mapped) {
        data[mapped] = String(row[k] || '').trim();
      }
    });
    if (!data.company) { result.skipped++; return; }

    const existingBase = baseData.find(c => c.company === data.company);
    const existingAdd = currentAdds.find(c => c.company === data.company);

    if (existingBase) {
      currentOverrides[data.company] = { ...existingBase, ...data };
      result.updated++;
    } else if (existingAdd) {
      Object.assign(existingAdd, data);
      result.updated++;
    } else {
      currentAdds.push(data);
      result.added++;
    }
  });

  plSet(view + '_adds', currentAdds);
  plSet(view + '_overrides', currentOverrides);
  return result;
}

function plConfirmImport() {
  const fileInput = document.getElementById('plImportFile');
  if (!fileInput.files[0]) { alert('파일을 선택하세요'); return; }
  
  const currentView = PL_STATE.view;
  const viewLabels = { internal: '내부용', contractor: '시공사 발송용', external: '외부 발송용' };
  const file = fileInput.files[0];
  const reader = new FileReader();
  
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      
      // 키 매핑 (한글 헤더 → 내부 키)
      const keyMap = {
        '지역': 'region', '상호': 'company', '회사명': 'company', '업체명': 'company',
        '업체코드': 'code', '코드': 'code',
        '대표자': 'ceo', '대표': 'ceo',
        '사업자번호': 'bizno',
        '주소': 'address',
        '연락처': 'phone', '전화': 'phone', '전화번호': 'phone',
        'FAX': 'fax', 'fax': 'fax',
        'Email': 'email', '이메일': 'email', 'email': 'email', 'EMAIL': 'email',
        '협약체결': 'mou', '협약체결일': 'mou', '협약일': 'mou',
        '자본금': 'capital',
        '비고': 'note', '메모': 'note',
      };
      
      // 시트 이름들 분석: view로 매칭되는 시트가 있는지 확인
      const sheetMatches = wb.SheetNames.map(name => ({
        name,
        view: plDetectViewFromSheetName(name)
      }));
      
      const matched = sheetMatches.filter(s => s.view);
      const multiSheetMode = matched.length >= 2; // 2개 이상이면 다중 시트 모드
      
      const results = []; // [{view, sheetName, result}]
      
      if (multiSheetMode) {
        // 다중 시트 모드: 매칭된 시트들 모두 처리
        // 같은 view에 여러 시트가 매칭되면 첫 번째만 사용 (중복 방지)
        const usedViews = new Set();
        matched.forEach(s => {
          if (usedViews.has(s.view)) return;
          usedViews.add(s.view);
          const ws = wb.Sheets[s.name];
          const result = plProcessSheet(ws, s.view, keyMap);
          results.push({ view: s.view, sheetName: s.name, result });
        });
      } else {
        // 단일 시트 모드: 첫 시트만 현재 view에 처리
        const ws = wb.Sheets[wb.SheetNames[0]];
        const result = plProcessSheet(ws, currentView, keyMap);
        if (result.total === 0) { alert('데이터가 없습니다'); return; }
        results.push({ view: currentView, sheetName: wb.SheetNames[0], result });
      }
      
      closeModal();
      
      // 결과 메시지 구성
      if (multiSheetMode) {
        const totalAdded = results.reduce((s, r) => s + r.result.added, 0);
        const totalUpdated = results.reduce((s, r) => s + r.result.updated, 0);
        const totalSkipped = results.reduce((s, r) => s + r.result.skipped, 0);
        const detail = results.map(r => 
          `${viewLabels[r.view]}: 신규 ${r.result.added} · 수정 ${r.result.updated}`
        ).join(' / ');
        toast(`📤 다중 시트 가져오기 완료 (총 신규 ${totalAdded} · 수정 ${totalUpdated}${totalSkipped > 0 ? ' · 건너뜀 ' + totalSkipped : ''})\n${detail}`);
      } else {
        const r = results[0].result;
        toast(`📤 가져오기 완료: 신규 ${r.added}건, 수정 ${r.updated}건${r.skipped > 0 ? ', 건너뜀 ' + r.skipped + '건' : ''}`);
      }
      
      renderPartnerList();
    } catch (err) {
      alert('엑셀 파일 읽기 실패: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function removeSiteRow(btn) {
  const row = btn.closest('.site-edit-row');
  if (!row) return;
  row.remove();
  // 번호 다시 매기기
  document.querySelectorAll('#sitesList .site-edit-row').forEach((r, i) => {
    r.querySelector('.site-edit-no').textContent = (i + 1);
    r.dataset.idx = i;
  });
  // 비어있으면 안내
  const remaining = document.querySelectorAll('#sitesList .site-edit-row').length;
  if (remaining === 0) {
    document.getElementById('sitesList').innerHTML = '<div class="text-lt fs-11" id="emptySites" style="padding:20px;text-align:center">등록된 현장이 없습니다. 아래 [+ 현장 추가]로 입력하세요.</div>';

                <div class="doc-meta">
                  <span class="doc-filename">${esc(d.fileName)}</span>
                  <span class="doc-size">${formatFileSize(d.size)}</span>
                </div>
                <div class="doc-date">${esc(d.addedAt)}</div>
              </div>
              <div class="doc-actions">
                <button class="btn sm primary" onclick="downloadDoc('${d.id}')">📥 다운로드</button>
                <button class="btn sm" onclick="renameDoc('${d.id}')">✏️</button>
                <button class="btn sm" style="color:var(--danger)" onclick="deleteDoc('${d.id}')">🗑️</button>
              </div>
            </div>
          `).join('')}
        </div>
      `}

  `;
}

function getFileIcon(mime, fileName) {
  if (!mime && fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    if (['pdf'].includes(ext)) return '📕';
    if (['doc','docx'].includes(ext)) return '📘';
    if (['xls','xlsx','csv'].includes(ext)) return '📗';
    if (['ppt','pptx'].includes(ext)) return '📙';
    if (['png','jpg','jpeg','gif','webp','svg'].includes(ext)) return '🖼️';
    if (['zip','rar','7z'].includes(ext)) return '📦';
    return '📄';
  }
  if (mime?.startsWith('image/')) return '🖼️';
  if (mime?.includes('pdf')) return '📕';
  if (mime?.includes('word')) return '📘';
  if (mime?.includes('sheet') || mime?.includes('excel')) return '📗';
  if (mime?.includes('presentation') || mime?.includes('powerpoint')) return '📙';
  return '📄';
}

function formatFileSize(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}
